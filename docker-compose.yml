# ─────────────────────────────────────────────────────────────────────────────
# Daleel — Docker Compose
# One-command full-stack setup for local development and demos.
#
# Usage:
#   docker compose up --build
#
# Services:
#   - daleel-api   : FastAPI application (port 8000)
#   - mongodb      : Document + vector store (port 27017)
#   - ollama       : Local LLM inference (port 11434, optional profile)
#
# Notes:
#   - To run the bundled Ollama service:
#     $env:DALEEL_DOCKER_LLM_BASE_URL="http://ollama:11434"
#     docker compose --profile ollama up --build
#     docker compose exec ollama ollama pull qwen2.5:7b
#   - Set your .env file OR edit environment variables below.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # MongoDB is provided by the local Windows service (port 27017).
  # The daleel-api container connects via host.docker.internal.

  daleel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daleel-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DALEEL_MONGODB_URL: mongodb://host.docker.internal:27017
      DALEEL_MONGODB_DB_NAME: manar
      DALEEL_LLM_BASE_URL: ${DALEEL_DOCKER_LLM_BASE_URL:-http://host.docker.internal:11434}
      DALEEL_LLM_MODEL: qwen2.5:7b
      DALEEL_LLM_MAX_RETRIES: 3
      DALEEL_LLM_TIMEOUT_CONNECT: 15.0
      DALEEL_LLM_TIMEOUT_READ: 300.0
      DALEEL_LLM_BACKOFF_BASE: 1.0
      DALEEL_LLM_BACKOFF_MAX: 16.0
      DALEEL_EMBEDDING_MODEL: sentence-transformers/paraphrase-multilingual-mpnet-base-v2
      DALEEL_EMBEDDING_DIMENSION: 768
      DALEEL_VECTOR_SEARCH_BACKEND: faiss
      DALEEL_CHUNK_SIZE: 1500
      DALEEL_CHUNK_OVERLAP: 200
      DALEEL_MAX_UPLOAD_MB: 100
      DALEEL_DOMAIN_ROUTER_ENABLED: true
      DALEEL_QUALITY_GUARD_ENABLED: true
      DALEEL_KG_LIGHT_ENABLED: true
      DALEEL_AUTO_MODE_ENABLED: true
      DALEEL_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://127.0.0.1:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - daleel-network
    volumes:
      - ./uploads:/app/uploads

  ollama:
    image: ollama/ollama:latest
    container_name: daleel-ollama
    profiles:
      - ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - daleel-network
    # Ollama is optional; if you prefer using an external Ollama instance,
    # set DALEEL_LLM_BASE_URL in your .env and remove this service.

volumes:
  ollama_data:

networks:
  daleel-network:
    driver: bridge
