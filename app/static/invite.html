<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daleel — Invitation</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c5cfc'/><text y='.9em' x='50' text-anchor='middle' font-size='70'>⚖️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --bg-card: #16162a;
            --accent: #7c5cfc;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124, 92, 252, 0.15);
            --text-primary: #e8e6f0;
            --text-secondary: #9896a8;
            --text-muted: #6b6980;
            --border: #2a2a40;
            --success: #34d399;
            --error: #f87171;
            --gradient-1: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 50%, #c084fc 100%);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(124, 92, 252, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-pattern {
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(124,92,252,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        .container { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 20px; }
        .header { text-align: center; margin-bottom: 28px; }
        .logo {
            width: 56px; height: 56px; background: var(--gradient-1); border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 28px; color: white; margin-bottom: 14px;
            box-shadow: var(--shadow-glow), 0 8px 32px rgba(124,92,252,0.3);
        }
        .header h1 { font-size: 22px; font-weight: 700; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header p { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }
        .card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
            padding: 28px; box-shadow: var(--shadow-lg);
        }
        .invite-info {
            background: var(--accent-glow); border: 1px solid rgba(124,92,252,0.2);
            border-radius: 10px; padding: 14px; margin-bottom: 22px; text-align: center;
        }
        .invite-info .org-name { font-size: 16px; font-weight: 600; color: var(--accent-light); }
        .invite-info .role-badge {
            display: inline-block; margin-top: 6px; padding: 3px 10px;
            background: var(--bg-tertiary); border-radius: 6px;
            font-size: 12px; color: var(--text-secondary);
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
        .form-group label .required { color: var(--error); }
        .form-input {
            width: 100%; padding: 12px 14px; background: var(--bg-primary);
            border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary);
            font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .form-input::placeholder { color: var(--text-muted); }
        .btn-primary {
            width: 100%; padding: 13px; background: var(--gradient-1); border: none; border-radius: 10px;
            color: white; font-family: inherit; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message, .success-message {
            border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none;
        }
        .error-message { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
        .success-message { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--success); }
        .error-message.visible, .success-message.visible { display: block; }
        .expired-state { text-align: center; padding: 20px 0; }
        .expired-state .icon { font-size: 48px; margin-bottom: 12px; }
        .expired-state h2 { font-size: 18px; margin-bottom: 8px; }
        .expired-state p { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
        .expired-state a { color: var(--accent-light); text-decoration: none; }
        .footer { text-align: center; margin-top: 18px; font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="container">
        <div class="header">
            <div class="logo">D</div>
            <h1>Daleel — دليل</h1>
            <p>Vous avez été invité à rejoindre une organisation</p>
        </div>

        <div class="card">
            <div id="error-msg" class="error-message"></div>
            <div id="success-msg" class="success-message"></div>

            <div id="loading-state" style="text-align:center; padding:30px 0; color:var(--text-secondary);">
                Vérification de l'invitation...
            </div>

            <div id="expired-state" class="expired-state" style="display:none;">
                <div class="icon">⏰</div>
                <h2>Invitation expirée</h2>
                <p>Cette invitation n'est plus valide. Veuillez demander une nouvelle invitation à votre administrateur.</p>
                <a href="/login">Retour à la connexion</a>
            </div>

            <form id="accept-form" style="display:none;" onsubmit="handleAccept(event)">
                <div class="invite-info">
                    <div class="org-name" id="org-name-display"></div>
                    <div class="role-badge" id="role-display"></div>
                </div>

                <div class="form-group">
                    <label>Nom complet <span class="required">*</span></label>
                    <input type="text" class="form-input" id="accept-name" placeholder="Votre nom complet" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe <span class="required">*</span></label>
                    <input type="password" class="form-input" id="accept-password" placeholder="Minimum 8 caractères" required minlength="8">
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe <span class="required">*</span></label>
                    <input type="password" class="form-input" id="accept-password-confirm" placeholder="Confirmez votre mot de passe" required minlength="8">
                </div>

                <button type="submit" class="btn-primary" id="accept-btn">Rejoindre l'organisation</button>
            </form>
        </div>
        <div class="footer">Daleel v1.0 — Conformité juridique intelligente</div>
    </div>

    <script>
        const API = '/api/v1';
        let invitationToken = '';

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            invitationToken = params.get('token');
            if (!invitationToken) {
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('expired-state').style.display = 'block';
                return;
            }
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('accept-form').style.display = 'block';

            const orgName = params.get('org') || 'Votre organisation';
            document.getElementById('org-name-display').textContent = orgName;
            document.getElementById('role-display').textContent = 'Membre';
        });

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg; el.classList.add('visible');
            document.getElementById('success-msg').classList.remove('visible');
        }

        async function handleAccept(e) {
            e.preventDefault();
            const pwd = document.getElementById('accept-password').value;
            const confirm = document.getElementById('accept-password-confirm').value;

            if (pwd !== confirm) { showError('Les mots de passe ne correspondent pas.'); return; }

            const btn = document.getElementById('accept-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Création du compte...';

            try {
                const res = await fetch(`${API}/auth/invitations/accept`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: invitationToken,
                        full_name: document.getElementById('accept-name').value.trim(),
                        password: pwd,
                    }),
                });
                const data = await res.json();

                if (!res.ok) {
                    if (res.status === 410 || res.status === 404) {
                        document.getElementById('accept-form').style.display = 'none';
                        document.getElementById('expired-state').style.display = 'block';
                    } else {
                        showError(data.detail || 'Erreur lors de la création du compte');
                    }
                    return;
                }

                localStorage.setItem('daleel_access_token', data.access_token);
                localStorage.setItem('daleel_refresh_token', data.refresh_token);
                localStorage.setItem('daleel_user', JSON.stringify(data.user));
                window.location.href = '/';
            } catch (err) {
                showError('Erreur de connexion au serveur');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Rejoindre l\'organisation';
            }
        }
    </script>
</body>
</html>
