<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daleel — دلـيـل | Expert Juridique Tunisien</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c5cfc'/><text y='.9em' x='50' text-anchor='middle' font-size='70'>⚖️</text></svg>">
    <meta name="description" content="Assistant juridique intelligent spécialisé en droit tunisien. Posez vos questions en arabe ou en français.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --bg-card: #16162a;
            --bg-user-msg: #2d1b69;
            --bg-bot-msg: #1a1a2e;
            --bg-source: #1e1e3a;
            --accent: #7c5cfc;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124, 92, 252, 0.15);
            --text-primary: #e8e6f0;
            --text-secondary: #9896a8;
            --text-muted: #6b6980;
            --border: #2a2a40;
            --border-accent: rgba(124, 92, 252, 0.3);
            --success: #34d399;
            --warning: #fbbf24;
            --gradient-1: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 50%, #c084fc 100%);
            --gradient-2: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(124, 92, 252, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            backdrop-filter: blur(20px);
        }

        .header-logo {
            width: 44px;
            height: 44px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 600;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-info p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .header-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .new-chat-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-left: 12px;
        }

        .new-chat-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
        }

        /* ── Chat Area ── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .chat-container::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ── Welcome Screen ── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 40px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 24px;
            box-shadow: 0 0 60px rgba(124, 92, 252, 0.3);
        }

        .welcome h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 700px;
        }

        .suggestion-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .suggestion-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
            transform: translateY(-2px);
        }

        /* ── Messages ── */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .message.user .msg-avatar {
            background: var(--bg-user-msg);
            color: var(--accent-light);
        }

        .message.bot .msg-avatar {
            background: var(--gradient-1);
            color: white;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg-bubble {
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.7;
            font-size: 14px;
        }

        .message.user .msg-bubble {
            background: var(--bg-user-msg);
            border: 1px solid rgba(124, 92, 252, 0.2);
            border-bottom-right-radius: 4px;
        }

        .message.bot .msg-bubble {
            background: var(--bg-bot-msg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* RTL support for Arabic messages */
        .msg-bubble[dir="rtl"] {
            text-align: right;
            direction: rtl;
        }

        .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
            margin: 16px 0 8px;
            color: var(--accent-light);
        }

        .msg-bubble h2 { font-size: 16px; }
        .msg-bubble h3 { font-size: 15px; }

        .msg-bubble p { margin: 6px 0; }

        .msg-bubble strong {
            color: var(--accent-light);
            font-weight: 600;
        }

        .msg-bubble ul, .msg-bubble ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .msg-bubble[dir="rtl"] ul, .msg-bubble[dir="rtl"] ol {
            padding-left: 0;
            padding-right: 20px;
        }

        .msg-bubble li { margin: 4px 0; }

        .msg-bubble code {
            background: rgba(124, 92, 252, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .message.user .msg-time { text-align: right; }

        /* ── Feedback Panel ── */
        .feedback-panel {
            margin-top: 10px;
            background: var(--bg-source);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .feedback-title {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .feedback-textarea {
            width: 100%;
            min-height: 90px;
            max-height: 220px;
            resize: vertical;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 10px 12px;
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            outline: none;
        }

        .feedback-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .feedback-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .feedback-save-btn {
            background: var(--gradient-1);
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
        }

        .feedback-save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .feedback-skip-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
        }

        .feedback-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ── Sources Panel ── */
        .sources-panel {
            margin-top: 4px;
        }

        .sources-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-source);
            border: 1px solid var(--border);
            color: var(--accent-light);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .sources-toggle:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .sources-toggle .arrow {
            transition: transform 0.3s ease;
            font-size: 10px;
        }

        .sources-toggle.open .arrow {
            transform: rotate(180deg);
        }

        .sources-list {
            display: none;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sources-list.hidden { display: none; }

        .source-card {
            background: var(--bg-source);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .source-card:hover {
            border-color: var(--border-accent);
            transform: translateX(4px);
        }

        .source-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-glow);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .source-info {
            flex: 1;
            min-width: 0;
        }

        .source-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .source-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .source-score {
            background: var(--accent-glow);
            color: var(--accent-light);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* ── Loading ── */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 20px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── Input Area ── */
        .input-area {
            padding: 16px 24px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            position: relative;
        }

        .input-box textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            resize: none;
            min-height: 48px;
            max-height: 150px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-box textarea::placeholder {
            color: var(--text-muted);
        }

        .input-box textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: var(--gradient-1);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(124, 92, 252, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .chat-container { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .message { max-width: 95%; }
            .welcome h2 { font-size: 22px; }
            .suggestions { flex-direction: column; align-items: center; }
        }
    </style>
    <script src="/static/auth-guard.js"></script>
    <script src="/static/i18n.js?v=20260516g"></script>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-logo">م</div>
        <div class="header-info">
            <h1>Daleel — دلـيـل</h1>
            <p data-i18n="index.brand.subtitle">Expert Juridique Tunisien</p>
        </div>
        <div class="header-status">
            <div class="status-dot"></div>
            <span data-i18n="common.online">En ligne</span>
            <button class="new-chat-btn" onclick="newChat()">✨ <span data-i18n="index.newChat">Nouvelle discussion</span></button>
            <a href="/admin" style="text-decoration:none"><button class="new-chat-btn">⚙️ <span data-i18n="index.admin">Admin</span></button></a>
            <button class="new-chat-btn" onclick="createCaseFromChat()">📂 <span data-i18n="index.case">Dossier</span></button>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-container" id="chatContainer">
        <!-- Welcome Screen -->
        <div class="welcome" id="welcomeScreen"></div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <div class="input-box">
                <textarea
                    id="userInput"
                    placeholder="Posez votre question juridique..."
                    data-i18n-placeholder="index.input.placeholder"
                    rows="1"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" data-i18n-aria-label="index.send">
                ➤
            </button>
        </div>
        <div class="input-hint" data-i18n="index.input.hint">
            Appuyez sur Entrée pour envoyer
        </div>
    </div>

    <script>
        function getApiCandidates() {
            const bases = [];

            // Preferred path when UI is served by FastAPI at the same origin.
            if (window.location.protocol !== 'file:') {
                bases.push(`${window.location.origin}/api/v1`);
            }

            // Fallbacks for local development when opening the HTML directly.
            bases.push('http://127.0.0.1:8000/api/v1');
            bases.push('http://localhost:8000/api/v1');
            bases.push('http://127.0.0.1:8001/api/v1');
            bases.push('http://localhost:8001/api/v1');

            // Deduplicate while preserving order.
            return [...new Set(bases)];
        }

        const API_CANDIDATES = getApiCandidates();
        let activeApiBase = API_CANDIDATES[0] || '/api/v1';

        async function fetchWithApiFallback(path, options) {
            let lastError = null;

            for (const base of API_CANDIDATES) {
                try {
                    const response = await fetch(`${base}${path}`, options);

                    // If backend responds (even with 4xx/5xx), consider endpoint reachable.
                    activeApiBase = base;
                    return response;
                } catch (err) {
                    lastError = err;
                }
            }

            throw lastError || new Error('API endpoint unreachable');
        }
        async function readResponsePayload(response) {
            const raw = await response.text();

            if (!raw) {
                return null;
            }

            try {
                return JSON.parse(raw);
            } catch (_) {
                return { detail: raw };
            }
        }
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let isLoading = false;

        function tr(key, params = {}) {
            return window.DaleelI18n ? DaleelI18n.t(key, params) : key;
        }

        function updateIndexChrome() {
            document.title = tr('index.title');
            const desc = document.querySelector('meta[name="description"]');
            if (desc) desc.setAttribute('content', tr('index.meta.description'));
            if (window.DaleelI18n) DaleelI18n.apply(document);
        }

        function welcomeMarkup() {
            const suggestions = [1, 2, 3, 4].map((n) => `
                <button class="suggestion-btn" onclick="askSuggestion(this)">${escapeHtml(tr(`index.suggestion.${n}`))}</button>
            `).join('');

            return `
                <div class="welcome-icon">⚖️</div>
                <h2>${escapeHtml(tr('index.welcome.title'))}</h2>
                <p>${tr('index.welcome.body')}</p>
                <div class="suggestions">${suggestions}</div>
            `;
        }

        function renderWelcome() {
            const ws = document.getElementById('welcomeScreen');
            if (ws) ws.innerHTML = welcomeMarkup();
        }

        // ── Conversation history ──
        let conversationHistory = [];

        // ── Arabic detection ──
        function isArabic(text) {
            const arabicRe = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/;
            const arabicChars = (text.match(/[\u0600-\u06FF]/g) || []).length;
            return arabicChars >= 2;
        }

        function detectMessageLanguage(text) {
            if (isArabic(text)) return 'ar';
            const lower = (text || '').toLowerCase();
            const frenchMarkers = [
                'quelle', 'quelles', 'quel', 'quels', 'comment', 'pourquoi',
                'dans', 'pour', 'avec', 'selon', 'droit', 'loi', 'article',
                'société', 'societe', 'contrat', 'obligation', 'obligations'
            ];
            if (/[àâäéèêëïîôùûüÿçœæ]/i.test(text)) return 'fr';
            if (frenchMarkers.filter((word) => lower.includes(word)).length >= 2) return 'fr';
            return 'en';
        }

        // ── Auto-resize textarea ──
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
            // Auto-detect RTL
            if (isArabic(el.value)) {
                el.style.direction = 'rtl';
                el.style.textAlign = 'right';
            } else {
                el.style.direction = 'ltr';
                el.style.textAlign = 'left';
            }
        }

        // ── Handle Enter key ──
        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // ── Suggestion click ──
        function askSuggestion(btn) {
            userInput.value = btn.textContent;
            autoResize(userInput);
            sendMessage();
        }

        // ── Adaptive retrieval settings ──
        function getAdaptiveRetrievalSettings(text) {
            const trimmed = (text || '').trim();
            const words = trimmed.split(/\s+/).filter(Boolean).length;
            const hasQuestionChain = /[؟?].*[؟?]|\b(et|ou|puis|ensuite|ainsi que|و|ثم|أو)\b/i.test(trimmed);
            const hasArticleMention = /(article|الفصل|فصل)\s*\d+/i.test(trimmed);

            // Default: balanced retrieval.
            let topK = 12;
            let temperature = 0.2;

            // Complex or multi-part legal questions need deeper retrieval.
            if (words >= 18 || hasQuestionChain || hasArticleMention) {
                topK = 20;
                temperature = 0.15;
            }

            // Very short questions can stay lighter.
            if (words <= 6 && !hasArticleMention) {
                topK = 10;
                temperature = 0.2;
            }

            return { topK, temperature };
        }

        // ── New chat ──
        function newChat() {
            conversationHistory = [];
            chatContainer.innerHTML = '<div class="welcome" id="welcomeScreen"></div>';
            renderWelcome();
        }

        // ── Time formatter ──
        function getTime() {
            return new Date().toLocaleTimeString(DaleelI18n?.getLang?.() || [], { hour: '2-digit', minute: '2-digit' });
        }

        function languageLabel(code) {
            if (code === 'ar') return tr('common.arabic');
            if (code === 'fr') return tr('common.french');
            if (code === 'en') return tr('common.english');
            return code || '';
        }

        // ── Simple markdown to HTML ──
        function renderMarkdown(text) {
            let html = text
                // Headers
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h2>$1</h2>')
                // Bold
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                // Inline code
                .replace(/`(.+?)`/g, '<code>$1</code>')
                // Unordered lists
                .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
                // Numbered lists
                .replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>')
                // Paragraphs
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            // Wrap consecutive <li> in <ul>
            html = html.replace(/(<li>.*?<\/li>)/gs, (match) => {
                if (!match.startsWith('<ul>')) {
                    return '<ul>' + match + '</ul>';
                }
                return match;
            });
            // Clean up nested <ul><ul>
            html = html.replace(/<\/ul>\s*<ul>/g, '');

            return '<p>' + html + '</p>';
        }

        // ── Add user message ──
        function addUserMessage(text) {
            const ws = document.getElementById('welcomeScreen');
            if (ws) ws.remove();

            const dir = isArabic(text) ? 'rtl' : 'ltr';
            const msgHtml = `
                <div class="message user">
                    <div class="msg-avatar">👤</div>
                    <div class="msg-content">
                        <div class="msg-bubble" dir="${dir}">${escapeHtml(text)}</div>
                        <div class="msg-time">${getTime()}</div>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', msgHtml);
            scrollToBottom();
        }

        // ── Add loading indicator ──
        function addLoading() {
            const html = `
                <div class="message bot" id="loadingMsg">
                    <div class="msg-avatar">⚖️</div>
                    <div class="msg-content">
                        <div class="msg-bubble">
                            <div class="typing-indicator">
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function removeLoading() {
            const el = document.getElementById('loadingMsg');
            if (el) el.remove();
        }

        // ── Add bot response ──
        function addBotMessage(answer, sources, originalQuestion = '') {
            const dir = isArabic(answer) ? 'rtl' : 'ltr';
            const renderedAnswer = renderMarkdown(answer);
            const feedbackId = `fb-${Date.now()}-${Math.floor(Math.random() * 100000)}`;

            let sourcesHtml = '';
            if (sources && sources.length > 0) {
                const sourceCards = sources.map((s, i) => {
                    const lang = languageLabel(s.language);
                    const page = s.page_number ? `${tr('common.page')} ${s.page_number}` : '';
                    const section = s.section || '';
                    const score = Math.round(s.relevance_score * 100);
                    const metaParts = [page, section, lang].filter(Boolean).join(' · ');

                    return `
                        <div class="source-card">
                            <div class="source-icon">📄</div>
                            <div class="source-info">
                                <div class="source-name">${escapeHtml(s.filename)}</div>
                                <div class="source-meta">${metaParts}</div>
                            </div>
                            <div class="source-score">${score}%</div>
                        </div>
                    `;
                }).join('');

                sourcesHtml = `
                    <div class="sources-panel">
                        <button class="sources-toggle" onclick="toggleSources(this)">
                            📚 ${tr('index.sources.used', {
                                count: sources.length,
                                plural: sources.length > 1 ? 's' : ''
                            })}
                            <span class="arrow">▼</span>
                        </button>
                        <div class="sources-list hidden" id="sources-${Date.now()}">
                            ${sourceCards}
                        </div>
                    </div>
                `;
            }

            const msgHtml = `
                <div class="message bot">
                    <div class="msg-avatar">⚖️</div>
                    <div class="msg-content">
                        <div class="msg-bubble" dir="${dir}">${renderedAnswer}</div>
                        ${sourcesHtml}
                        ${buildFeedbackPanelHtml(feedbackId, originalQuestion, answer)}
                        <div class="msg-time">${getTime()}</div>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', msgHtml);
            scrollToBottom();
        }

        function buildFeedbackPanelHtml(feedbackId, originalQuestion, answer) {
            const encoded = encodeURIComponent(originalQuestion || '');
            return `
                <div class="feedback-panel" id="${feedbackId}">
                    <div class="feedback-title">✏️ ${escapeHtml(tr('index.feedback.title'))}</div>
                    <textarea class="feedback-textarea" id="${feedbackId}-text"
                        placeholder="${escapeHtml(tr('index.feedback.placeholder'))}">${escapeHtml(answer)}</textarea>
                    <div class="feedback-actions">
                        <button class="feedback-save-btn" id="${feedbackId}-save"
                            onclick="saveFeedback('${feedbackId}','${encoded}')">💾 ${escapeHtml(tr('common.save'))}</button>
                        <button class="feedback-skip-btn"
                            onclick="dismissFeedback('${feedbackId}')">${escapeHtml(tr('common.ignore'))}</button>
                        <span class="feedback-status" id="${feedbackId}-status"></span>
                    </div>
                </div>
            `;
        }

        function dismissFeedback(feedbackId) {
            const panel = document.getElementById(feedbackId);
            if (panel) panel.remove();
        }

        async function saveFeedback(feedbackId, encodedQuestion) {
            const textEl = document.getElementById(`${feedbackId}-text`);
            const saveBtn = document.getElementById(`${feedbackId}-save`);
            const statusEl = document.getElementById(`${feedbackId}-status`);
            if (!textEl || !saveBtn || !statusEl) return;

            const corrected = (textEl.value || '').trim();
            const question = decodeURIComponent(encodedQuestion || '');

            if (!corrected || corrected.length < 10) {
                statusEl.textContent = tr('index.feedback.tooShort');
                return;
            }

            saveBtn.disabled = true;
            statusEl.textContent = tr('index.feedback.saving');

            try {
                const resp = await fetchWithApiFallback('/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        corrected_answer: corrected,
                        language: isArabic(question) || isArabic(corrected) ? 'ar' : 'fr',
                        rating: 5,
                        notes: 'saved_from_chat_ui',
                        tags: ['auto-feedback']
                    })
                });

                if (resp.ok) {
                    statusEl.textContent = `✅ ${tr('index.feedback.saved')}`;
                    textEl.disabled = true;
                } else {
                    statusEl.textContent = `❌ ${tr('index.feedback.failed')}`;
                    saveBtn.disabled = false;
                }
            } catch (_) {
                statusEl.textContent = `❌ ${tr('index.feedback.network')}`;
                saveBtn.disabled = false;
            }
        }

        // ── Toggle sources ──
        function toggleSources(btn) {
            btn.classList.toggle('open');
            const list = btn.nextElementSibling;
            list.classList.toggle('hidden');
        }

        // ── Escape HTML ──
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ── Scroll to bottom ──
        function scrollToBottom() {
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 50);
        }

        // ── Send message ──
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isLoading) return;

            const retrieval = getAdaptiveRetrievalSettings(text);
            const responseLanguage = detectMessageLanguage(text);

            isLoading = true;
            sendBtn.disabled = true;
            userInput.value = '';
            userInput.style.height = 'auto';
            userInput.style.direction = 'ltr';

            addUserMessage(text);
            addLoading();

            try {
                const askHeaders = { 'Content-Type': 'application/json' };
                const jwt = localStorage.getItem('access_token');
                if (jwt) askHeaders['Authorization'] = 'Bearer ' + jwt;
                const response = await fetchWithApiFallback('/ask-agentic', {
                    method: 'POST',
                    headers: askHeaders,
                    body: JSON.stringify({
                        question: text,
                        top_k: retrieval.topK,
                        temperature: retrieval.temperature,
                        response_language: responseLanguage,
                        history: conversationHistory
                    })
                });

                const data = await readResponsePayload(response);
                removeLoading();

                if (response.ok) {
                    addBotMessage(data.answer, data.sources, text);

                    // Save to conversation history
                    conversationHistory.push(
                        { role: 'user', content: text },
                        { role: 'assistant', content: data.answer }
                    );

                    // Keep history manageable (last 10 exchanges)
                    if (conversationHistory.length > 20) {
                        conversationHistory = conversationHistory.slice(-20);
                    }
                } else {
                    addBotMessage(
                        data?.detail || data?.message || tr('index.error.generic'),
                        [],
                        ''
                    );
                }
            } catch (err) {
                removeLoading();
                const detail = err?.message && err.message !== 'API endpoint unreachable'
                    ? `\n\n${tr('index.error.detail', { message: err.message })}`
                    : '';
                addBotMessage(
                    `❌ ${tr('index.error.api')}` +
                    detail,
                    [],
                    ''
                );
            }

            isLoading = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // ── Create case from chat ──
        async function createCaseFromChat(){
            const title = prompt(tr('index.case.prompt'));
            if(!title) return;
            try{
                const response = await fetchWithApiFallback('/cases', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({title, description:null, company_profile_id:null, priority:'medium', assigned_to:null, tags:[], created_by:'chatbot'})
                });
                if(response.ok){
                    addBotMessage(`✅ ${tr('index.case.created', { title })}`, [], '');
                }else{
                    const data = await readResponsePayload(response);
                    addBotMessage(data?.detail || `❌ ${tr('index.case.createError')}`, [], '');
                }
            }catch(err){
                addBotMessage(`❌ ${tr('index.case.network')} ${err?.message ? `(${err.message})` : ''}`, [], '');
            }
        }

        DaleelI18n.init({
            switcher: '.header-status',
            onChange: () => {
                updateIndexChrome();
                renderWelcome();
            }
        });
        updateIndexChrome();
        renderWelcome();

        // ── Focus input on load ──
        userInput.focus();
    </script>
</body>
</html>
