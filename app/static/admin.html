<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daleel Admin — Plateforme de Conformité</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a2e; --card: #16162a;
  --accent: #7c5cfc; --accent2: #a78bfa; --accent-glow: rgba(124,92,252,.15);
  --text: #e8e6f0; --text2: #9896a8; --text3: #6b6980;
  --border: #2a2a40; --success: #34d399; --warn: #fbbf24; --danger: #f87171;
  --info: #60a5fa; --shadow: 0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}

/* Sidebar */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo span{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{padding:8px 0;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-radius:0;transition:.15s;color:var(--text2);border-left:3px solid transparent}
.nav-item:hover{background:var(--accent-glow);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);border-left-color:var(--accent)}
.nav-item .icon{width:18px;text-align:center;font-size:16px}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.chatbot-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--accent);border-radius:8px;color:#fff;cursor:pointer;text-decoration:none;font-size:13px;font-weight:500;transition:.15s}
.chatbot-btn:hover{background:var(--accent2)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(52,211,153,.15);color:var(--success)}
.badge-warn{background:rgba(251,191,36,.15);color:var(--warn)}
.badge-info{background:rgba(96,165,250,.15);color:var(--info)}
.content{flex:1;overflow-y:auto;padding:24px}

/* Cards & Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:.2s}
.stat-card:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.stat-icon{font-size:24px;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:700;color:var(--accent2)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}

/* Tables */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:10px 14px;border-bottom:1px solid rgba(42,42,64,.5);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(124,92,252,.05)}

/* Forms */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
label{font-size:12px;color:var(--text2);font-weight:500}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(248,113,113,.15);color:var(--danger);border:1px solid rgba(248,113,113,.3)}.btn-danger:hover{background:rgba(248,113,113,.25)}
.btn-success{background:rgba(52,211,153,.15);color:var(--success);border:1px solid rgba(52,211,153,.3)}.btn-success:hover{background:rgba(52,211,153,.25)}
.btn-warn{background:rgba(251,191,36,.15);color:var(--warn);border:1px solid rgba(251,191,36,.3)}.btn-warn:hover{background:rgba(251,191,36,.25)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

/* Section headers */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:18px;font-weight:600}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:20px}

/* Status badges */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-active{background:rgba(52,211,153,.15);color:var(--success)}
.tag-pending{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-applied{background:rgba(96,165,250,.15);color:var(--info)}
.tag-rejected,.tag-error{background:rgba(248,113,113,.15);color:var(--danger)}
.tag-superseded{background:rgba(107,105,128,.2);color:var(--text2)}
.tag-repealed{background:rgba(248,113,113,.1);color:var(--danger)}
.tag-critique{background:rgba(248,113,113,.15);color:var(--danger)}
.tag-importante{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-secondaire{background:rgba(52,211,153,.15);color:var(--success)}
.tag-modificatif{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-loi_principale{background:rgba(96,165,250,.15);color:var(--info)}
/* Case status / priority badges */
.tag-open{background:rgba(96,165,250,.15);color:var(--info)}
.tag-in_progress{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-under_review{background:rgba(124,92,252,.15);color:var(--accent2)}
.tag-resolved{background:rgba(52,211,153,.15);color:var(--success)}
.tag-closed{background:rgba(107,105,128,.15);color:var(--text3)}
.tag-critical{background:rgba(248,113,113,.2);color:var(--danger)}
.tag-high{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-medium{background:rgba(96,165,250,.15);color:var(--info)}
.tag-low{background:rgba(107,105,128,.15);color:var(--text3)}

/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg3)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-glow)}
.upload-zone input{display:none}
.upload-zone-text{color:var(--text2);margin-top:8px;font-size:13px}

/* Step workflow */
.steps{display:flex;gap:0;margin-bottom:24px;overflow-x:auto}
.step{flex:1;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-right:none;cursor:pointer;font-size:13px;transition:.2s;min-width:120px;text-align:center}
.step:first-child{border-radius:8px 0 0 8px}
.step:last-child{border-right:1px solid var(--border);border-radius:0 8px 8px 0}
.step.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
.step.done{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:var(--success)}
.step-num{display:block;font-size:18px;font-weight:700;margin-bottom:2px}
.step-lbl{font-size:11px;color:inherit}

/* Panel */
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.panel-title{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--accent2)}

/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;animation:slideIn .2s ease;display:flex;align-items:center;gap:8px;max-width:360px;box-shadow:var(--shadow)}
.toast-success{background:#064e3b;color:var(--success);border:1px solid rgba(52,211,153,.3)}
.toast-error{background:#450a0a;color:var(--danger);border:1px solid rgba(248,113,113,.3)}
.toast-info{background:#1e3a5f;color:var(--info);border:1px solid rgba(96,165,250,.3)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Audit timeline */
.audit-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,42,64,.5)}
.audit-item:last-child{border-bottom:none}
.audit-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.audit-dot-applied{background:var(--success)}
.audit-dot-superseded{background:var(--warn)}
.audit-dot-repealed,.audit-dot-rejected{background:var(--danger)}
.audit-dot-extracted{background:var(--info)}
.audit-dot-classified{background:var(--accent)}
.audit-dot-recalculation{background:var(--accent2)}
.audit-dot-default{background:var(--text2)}
.audit-time{font-size:11px;color:var(--text3)}
.audit-event{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.audit-detail{font-size:12px;color:var(--text2)}

/* Roadmap */
.roadmap-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;transition:.2s}
.roadmap-item:hover{border-color:var(--accent)}
.roadmap-pos{display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;text-align:center;line-height:28px;font-size:12px;font-weight:700;margin-right:10px;flex-shrink:0}
.roadmap-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.roadmap-action{font-size:13px;font-weight:500;flex:1}
.roadmap-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--text2)}
.roadmap-conditions{margin-top:8px;font-size:12px;color:var(--text2)}
.roadmap-preuve{margin-top:6px;font-size:12px;color:var(--success);padding:6px 10px;background:rgba(52,211,153,.08);border-radius:6px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;min-width:340px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* Loading */
.loading{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text2);font-size:13px;display:flex;align-items:center;gap:8px;padding:20px 0}

/* Empty state */
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* Misc */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.text-muted{color:var(--text2)}
.text-success{color:var(--success)}
.text-danger{color:var(--danger)}
.text-warn{color:var(--warn)}
.text-info{color:var(--info)}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.items-center{align-items:center}
.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}
.w-full{width:100%}
pre{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px;overflow-x:auto;white-space:pre-wrap;color:var(--text2)}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;padding:8px 0}
.pagination .btn{min-width:36px;justify-content:center}
.pagination .page-info{font-size:12px;color:var(--text2)}
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <span>⚖️</span>
    <span>Daleel Admin</span>
  </div>
  <div class="nav" id="nav">
    <div class="nav-item active" data-section="dashboard"><span class="icon">📊</span> Dashboard</div>
    <div class="nav-item" data-section="documents"><span class="icon">📄</span> Documents</div>
    <div class="nav-item" data-section="lois"><span class="icon">⚖️</span> Lois & Articles</div>
    <div class="nav-item" data-section="amendements"><span class="icon">📝</span> Amendements</div>
    <div class="nav-item" data-section="conformite"><span class="icon">✅</span> Conformité</div>
    <div class="nav-item" data-section="cases"><span class="icon">📂</span> Dossiers</div>
    <div class="nav-item" data-section="posture"><span class="icon">🛡️</span> Posture</div>
    <div class="nav-item" data-section="assessments"><span class="icon">📊</span> Évaluations</div>
    <div class="nav-item" data-section="controls"><span class="icon">🔒</span> Contrôles</div>
    <div class="nav-item" data-section="exceptions"><span class="icon">⚠️</span> Exceptions</div>
    <div class="nav-item" data-section="audit"><span class="icon">📋</span> Audit Log</div>
    <div class="nav-item" data-section="recherche"><span class="icon">🔍</span> Recherche</div>
    <div class="nav-item" data-section="vecteur"><span class="icon">⚡</span> Vecteurs</div>
  </div>
  <div class="sidebar-footer">
    <a href="/" class="chatbot-btn" target="_blank">💬 Assistant Juridique</a>
  </div>
</nav>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-right">
      <span class="badge badge-info" id="api-status">⏳ Connexion…</span>
      <a href="/docs" target="_blank" class="btn btn-secondary btn-sm">API Docs</a>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading-text"><span class="loading"></span> Chargement…</div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '/api/v1';
let currentSection = 'dashboard';
const PAGE_SIZE = 25;

// ── Pagination helper ─────────────────────────────────────────────────
function paginationHtml(total, skip, pageSize, onPageFn) {
  const page = Math.floor(skip / pageSize) + 1;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const hasPrev = page > 1;
  const hasNext = page < totalPages;
  return `<div class="pagination">
    <button class="btn btn-secondary btn-sm" ${hasPrev ? `onclick="${onPageFn}(${(page-2)*pageSize})"` : 'disabled'}>&laquo; Préc.</button>
    <span class="page-info">Page ${page} / ${totalPages} (${total} total)</span>
    <button class="btn btn-secondary btn-sm" ${hasNext ? `onclick="${onPageFn}(${page*pageSize})"` : 'disabled'}>Suiv. &raquo;</button>
  </div>`;
}

// ── Toast ──────────────────────────────────────────────────────────────
function toast(msg, type='info', dur=4000) {
  const t = document.getElementById('toasts');
  const d = document.createElement('div');
  d.className = `toast toast-${type}`;
  const icons = {success:'✅', error:'❌', info:'ℹ️'};
  d.innerHTML = `<span>${icons[type]||'•'}</span><span>${msg}</span>`;
  t.appendChild(d);
  setTimeout(() => d.remove(), dur);
}

// ── API layer ──────────────────────────────────────────────────────────
async function apiFetch(path, opts={}) {
  try {
    const r = await fetch(API + path, {
      headers: {'Content-Type':'application/json', ...opts.headers},
      ...opts
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({detail: r.statusText}));
      throw new Error(err.detail || r.statusText);
    }
    if (r.status === 204) return null;
    return r.json();
  } catch(e) {
    throw e;
  }
}
const api = {
  get: (p) => apiFetch(p),
  post: (p, b) => apiFetch(p, {method:'POST', body: b !== undefined ? JSON.stringify(b) : undefined}),
  patch: (p, b) => apiFetch(p, {method:'PATCH', body: JSON.stringify(b)}),
  del: (p) => apiFetch(p, {method:'DELETE'}),
};

async function uploadFile(path, file, extra={}) {
  const fd = new FormData();
  fd.append('file', file);
  Object.entries(extra).forEach(([k,v]) => fd.append(k, v));
  const r = await fetch(API + path, {method:'POST', body: fd});
  if (!r.ok) { const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail); }
  return r.json();
}

// ── Navigation ─────────────────────────────────────────────────────────
function navigate(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === section);
  });
  const titles = {
    dashboard:'Dashboard', documents:'Documents', lois:'Lois & Articles',
    amendements:'Amendements', conformite:'Conformité & Roadmap',
    cases:'Dossiers de Conformité', posture:'Posture de Conformité',
    assessments:'Évaluations', controls:'Contrôles & Preuves',
    exceptions:'Registre d\'Exceptions', audit:'Journal d\'Audit', recherche:'Recherche Sémantique', vecteur:'Moteur Vectoriel'
  };
  document.getElementById('topbar-title').textContent = titles[section] || section;
  render(section);
}

document.getElementById('nav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (item) navigate(item.dataset.section);
});

async function render(section) {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading-text"><span class="loading"></span> Chargement…</div>';
  try {
    const renders = {
      dashboard: renderDashboard, documents: renderDocuments, lois: renderLois,
      amendements: renderAmendements, conformite: renderConformite,
      cases: renderCases, posture: renderPosture,
      assessments: renderAssessments, controls: renderControls,
      exceptions: renderExceptions, audit: renderAudit, recherche: renderRecherche, vecteur: renderVecteur
    };
    if (renders[section]) await renders[section](c);
  } catch(e) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

// ── Helper renderers ───────────────────────────────────────────────────
function tag(text, cls='') { return `<span class="tag tag-${cls||text.toLowerCase()}">${text}</span>`; }
function btn(label, onclick, cls='secondary', sm=false) {
  return `<button class="btn btn-${cls}${sm?' btn-sm':''}" onclick="${onclick}">${label}</button>`;
}
function fmt(v) { return v ?? '—'; }
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('fr-FR', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// ══════════════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════════════
async function renderDashboard(c) {
  const [stats, logs, vec, caseSummary, controlsData] = await Promise.all([
    api.get('/admin/stats'),
    api.get('/audit-logs?limit=6'),
    api.get('/admin/vector-stats').catch(() => null),
    api.get('/cases/summary').catch(() => ({total_cases:0, by_status:{}, by_priority:{}})),
    api.get('/compliance/controls?limit=1').catch(() => ({total:0})),
  ]);

  const s = stats;
  const cs = caseSummary;
  const cards = [
    {icon:'📁', value: cs.total_cases,          label:'Dossiers',    sub: `${cs.by_status?.open||0} ouverts · ${cs.by_status?.in_progress||0} en cours`},
    {icon:'🔴', value: cs.by_priority?.critical||0, label:'Critiques', sub: `${cs.by_status?.resolved||0} résolus`},
    {icon:'📄', value: s.documents.total,        label:'Documents',   sub: `${s.chunks.total} chunks`},
    {icon:'⚖️', value: s.lois.total,             label:'Lois',        sub: `${s.articles.total} articles`},
    {icon:'🔍', value: s.exigences.total,         label:'Exigences',   sub: Object.entries(s.exigences.by_type||{}).map(([k,v])=>`${k}:${v}`).join(' ')},
    {icon:'✅', value: s.actions.total,           label:'Actions',     sub: `${s.actions.criticalities.total} avec criticité`},
    {icon:'👥', value: s.profiles.total,          label:'Profils',     sub: ''},
    {icon:'📝', value: s.amendments.total,        label:'Amendements', sub: `${s.amendments.by_status.pending||0} en attente`},
    {icon:'📜', value: s.audit_logs.total,        label:'Événements',  sub: 'journal d\'audit'},
    {icon:'🔒', value: controlsData.total,         label:'Contrôles',   sub: 'compliance steering'},
  ];

  const statsHtml = cards.map(cd =>
    `<div class="stat-card">
      <div class="stat-icon">${cd.icon}</div>
      <div class="stat-value">${cd.value??0}</div>

const _chartDefaults = { color: '#9896a8', borderColor: '#2a2a40' };

async function renderAnalyticsCharts() {
  const analytics = await api.get('/admin/analytics?days=30').catch(() => null);
  if (!analytics) return;

  const chartOpts = (label, color) => ({
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#6b6980', font: { size: 10 } }, grid: { color: '#1a1a2e' } },
      y: { beginAtZero: true, ticks: { color: '#6b6980' }, grid: { color: '#1a1a2e' } }
    }
  });

  // Q&A daily
  const qaCtx = document.getElementById('chart-qa');
  if (qaCtx && analytics.qa_daily.length) {
    new Chart(qaCtx, {
      type: 'bar',
      data: {
        labels: analytics.qa_daily.map(d => d.date.slice(5)),
        datasets: [{ label: 'Questions', data: analytics.qa_daily.map(d => d.count), backgroundColor: '#7c5cfc88', borderColor: '#7c5cfc', borderWidth: 1 }]
      },
      options: chartOpts('Questions', '#7c5cfc')
    });
  }

  // Satisfaction
  const satCtx = document.getElementById('chart-satisfaction');
  if (satCtx && analytics.satisfaction.length) {
    new Chart(satCtx, {
      type: 'line',
      data: {
        labels: analytics.satisfaction.map(d => d.date.slice(5)),
        datasets: [{ label: 'Note moy.', data: analytics.satisfaction.map(d => d.avg_rating), borderColor: '#34d399', backgroundColor: '#34d39922', tension: .3, fill: true }]
      },
      options: { ...chartOpts('Satisfaction', '#34d399'), scales: { ...chartOpts().scales, y: { min: 0, max: 5, ticks: { color: '#6b6980' }, grid: { color: '#1a1a2e' } } } }
    });
  }

  // Coverage bar
  const covCtx = document.getElementById('chart-coverage');
  if (covCtx && analytics.coverage.length) {
    new Chart(covCtx, {
      type: 'bar',
      data: {
        labels: analytics.coverage.map(d => d.profile_name),
        datasets: [{ label: 'Couverture %', data: analytics.coverage.map(d => d.coverage_pct), backgroundColor: '#60a5fa88', borderColor: '#60a5fa', borderWidth: 1 }]
      },
      options: { ...chartOpts('Couverture', '#60a5fa'), indexAxis: 'y', scales: { x: { max: 100, ticks: { color: '#6b6980' }, grid: { color: '#1a1a2e' } }, y: { ticks: { color: '#6b6980' }, grid: { color: '#1a1a2e' } } } }
    });
  }
}

async function doUpload() {

  closeModal();
  try {

    toast(`✅ "${r.filename}" uploadé (${r.total_chunks} chunks)`, 'success');

}

let aState = {step: 1, docId: null, loiId: null, ops: []};

async function renderAmendements(c) {
  const [docs, lois] = await Promise.all([api.get('/documents?limit=100'), api.get('/lois')]);

  c.innerHTML = `
    <div class="section-header"><span class="section-title">Workflow Amendements</span></div>
    <p class="section-sub">Pipeline en 5 étapes : Classification → Extraction → Revue → Application → Recalcul</p>
    <div class="steps" id="amend-steps">
      ${['1 Classifier','2 Extraire','3 Réviser','4 Appliquer','5 Recalculer'].map((s,i) =>
        `<div class="step${i+1===aState.step?' active':i+1<aState.step?' done':''}" data-step="${i+1}">
          <span class="step-num">${i+1}</span><span class="step-lbl">${s.slice(2)}</span>
        </div>`).join('')}
    </div>
    <div id="amend-content"></div>`;

  renderAmendStep(c.querySelector('#amend-content'), docs, lois);
}

function renderAmendStep(container, docs, lois) {
  const readyDocs = (docs?.documents||[]).filter(d => d.status==='ready');

  if (aState.step === 1) {
    container.innerHTML = `
      <div class="panel"><div class="panel-title">Étape 1 — Classifier le document modificatif</div>
        <div class="form-grid">
          <div class="form-group"><label>Document modificatif</label>
            <select id="a-doc">
              <option value="">— Sélectionner —</option>
              ${readyDocs.map(d=>`<option value="${d.id}">${d.filename}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Loi cible</label>
            <select id="a-loi">
              <option value="">— Sélectionner —</option>
              ${(lois?.lois||[]).map(l=>`<option value="${l.id}">${l.code} — ${l.name}</option>`).join('')}
            </select>
          </div>
        </div>
        <button class="btn btn-primary" onclick="amendStep1()">Classifier & Continuer →</button>
      </div>`;
  } else if (aState.step === 2) {
    container.innerHTML = `
      <div class="panel"><div class="panel-title">Étape 2 — Extraction LLM des opérations</div>
        <p class="text-muted mb-16">Document: <code>${aState.docId}</code> · Loi: <code>${aState.loiId}</code></p>
        <button class="btn btn-primary" onclick="amendStep2()">🤖 Extraire les opérations</button>
        ${btn('← Retour', 'aState.step=1;navigate("amendements")', 'secondary')}
      </div>`;
  } else if (aState.step === 3) {
    const opsHtml = aState.ops.length ? `
      <div class="table-wrap"><table>
        <thead><tr><th>Type</th><th>Article</th><th>Texte (aperçu)</th><th>Preuve</th><th>Conf.</th><th>Statut</th></tr></thead>
        <tbody>
          ${aState.ops.map(op => `<tr>
            <td>${tag(op.operation_type, 'active')}</td>
            <td><code>${op.target_article_key}</code></td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(op.new_text||'—').slice(0,80)}</td>
            <td style="max-width:160px;font-size:11px;color:var(--text2)">${op.proof_extract.slice(0,60)}…</td>
            <td>${(op.confidence*100).toFixed(0)}%</td>
            <td>${tag(op.status, op.status)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
      <div class="btn-group mt-16">
        <button class="btn btn-primary" onclick="amendStep4()">✅ Appliquer tout →</button>
        ${btn('← Retour', 'aState.step=2;navigate("amendements")', 'secondary')}
      </div>` : `<div class="empty"><div class="empty-icon">😕</div><p>Aucune opération extraite</p>${btn('← Retour','aState.step=2;navigate("amendements")','secondary')}</div>`;

    container.innerHTML = `<div class="panel"><div class="panel-title">Étape 3 — Révision des opérations (${aState.ops.length})</div>${opsHtml}</div>`;
  } else if (aState.step === 4) {
    container.innerHTML = `
      <div class="panel"><div class="panel-title">Étape 4 — Application des amendements</div>
        <p class="text-muted mb-16">Cliquez pour appliquer les ${aState.ops.filter(o=>o.status==='pending').length} opération(s) en attente.</p>
        <button class="btn btn-primary" onclick="amendStep4Apply()">⚡ Appliquer tous</button>
        ${btn('← Retour', 'aState.step=3;navigate("amendements")', 'secondary')}
      </div>`;
  } else if (aState.step === 5) {

  if (evtType) path += '&event_type=' + evtType;

  if (!list) return;
  list.innerHTML = '<div class="loading-text"><span class="loading"></span></div>';
  try {
    const data = await api.get(path);
    const dotClass = e => {
      if (e.includes('applied')) return 'applied';
      if (e.includes('superseded')) return 'superseded';
      if (e.includes('repealed')) return 'repealed';
      if (e.includes('extracted')) return 'extracted';
      if (e.includes('classified')) return 'classified';
      if (e.includes('recalculation')) return 'recalculation';
      return 'default';

    list.innerHTML = `<div class="panel">

  } catch(e) { list.innerHTML = `<div class="empty">${e.message}</div>`; }

function chooseModeAutomatically(question='') {
  const q = (question || '').toLowerCase();

  const agenticHints = [
    'conseil','conseils','advice','solution','plan','plan d\'action','etapes','étapes',
    'comment faire','priorité','priorite','exigence','exigences','conformité','conformite',
    'applicable','obligation','obligations','risque','audit','roadmap','recommandation',
    'نصيحة','حل','خطة','متطلبات','امتثال','قابل للتطبيق','واجب'
  ];

  const shouldUseAgentic =
    q.length > 220 ||
    agenticHints.some(h => q.includes(h)) ||
    q.includes('?') && (q.includes('comment') || q.includes('how'));

  return shouldUseAgentic ? 'agentic' : 'classic';
}

async function doAsk() {
  const q = document.getElementById('ask-input').value.trim();
  if (!q) return;

  const mode = document.getElementById('ask-mode').value;
  const effectiveMode = mode === 'auto' ? 'auto' : mode;
  const lang = document.getElementById('ask-lang').value || null;
  const topK = Math.max(1, Math.min(20, parseInt(document.getElementById('ask-topk').value || '5', 10)));
  const target = document.getElementById('ask-results');
  const compareTarget = document.getElementById('ask-compare');
  compareTarget.innerHTML = '';

  target.innerHTML = '<div class="loading-text"><span class="loading"></span> Génération de la reponse…</div>';

  try {
    const endpoint = effectiveMode === 'auto' ? '/ask-auto' : (effectiveMode === 'agentic' ? '/ask-agentic' : '/ask');
    const payload = {
      question: q,
      top_k: topK,
      language_filter: lang,
      document_id: null,
      temperature: 0.3,
      history: []
    };
    const r = await api.post(endpoint, payload);

    if (mode === 'auto') {
      const modeLabel = (r.selected_mode || 'classic') === 'agentic' ? 'agentic' : 'classique';
      const reason = r.auto_reason ? ` (${r.auto_reason})` : '';
      toast(`Mode auto: ${modeLabel} sélectionné${reason}`, 'info', 2800);
    }

    const usedMode = mode === 'auto' ? (r.selected_mode || 'classic') : effectiveMode;

    target.innerHTML = `
      <div class="panel">
        <div class="panel-title">reponse (${usedMode === 'agentic' ? 'Agentic' : 'Classique'})</div>
        <div style="line-height:1.7;font-size:13px;white-space:pre-wrap">${r.answer || ''}</div>
      </div>
      <div class="panel">
        <div class="panel-title">Sources (${r.chunks_used || 0} chunks)</div>
        ${renderAskSources(r.sources || [])}
      </div>
      ${usedMode === 'agentic' ? renderAgenticMeta(r) : ''}
    `;
  } catch (e) {
    target.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

async function doCompareAsk() {
  const q = document.getElementById('ask-input').value.trim();
  if (!q) return;

  const lang = document.getElementById('ask-lang').value || null;
  const topK = Math.max(1, Math.min(20, parseInt(document.getElementById('ask-topk').value || '5', 10)));
  const target = document.getElementById('ask-compare');
  const askTarget = document.getElementById('ask-results');
  askTarget.innerHTML = '';

  const payload = {
    question: q,
    top_k: topK,
    language_filter: lang,
    document_id: null,
    temperature: 0.3,
    history: []
  };

  target.innerHTML = '<div class="loading-text"><span class="loading"></span> Comparaison en cours…</div>';

  const tClassic = performance.now();
  const classicPromise = api.post('/ask', payload).then(r => ({ok:true, data:r, elapsed:performance.now()-tClassic})).catch(e => ({ok:false, error:e.message, elapsed:performance.now()-tClassic}));

  const tAgentic = performance.now();
  const agenticPromise = api.post('/ask-agentic', payload).then(r => ({ok:true, data:r, elapsed:performance.now()-tAgentic})).catch(e => ({ok:false, error:e.message, elapsed:performance.now()-tAgentic}));

  const [classic, agentic] = await Promise.all([classicPromise, agenticPromise]);

  const classicSummary = classic.ok
    ? `<div class="panel-title">Classique</div>
       <div class="text-muted" style="font-size:12px;margin-bottom:8px">Latence: ${classic.elapsed.toFixed(1)} ms · Chunks: ${classic.data.chunks_used || 0}</div>
       <div style="line-height:1.6;font-size:13px;white-space:pre-wrap;max-height:260px;overflow:auto">${classic.data.answer || ''}</div>`
    : `<div class="panel-title">Classique</div><div class="text-danger">Erreur: ${classic.error}</div>`;

  const agenticSummary = agentic.ok
    ? `<div class="panel-title">Agentic</div>
       <div class="text-muted" style="font-size:12px;margin-bottom:8px">Latence API: ${agentic.elapsed.toFixed(1)} ms · Route: ${agentic.data.route_decision || '—'} · Tentatives: ${agentic.data.retrieval_attempts ?? 0}</div>
       <div class="text-muted" style="font-size:12px;margin-bottom:8px">Timing interne: total ${(agentic.data.timings_ms?.total ?? 0).toFixed ? agentic.data.timings_ms.total.toFixed(1) : (agentic.data.timings_ms?.total ?? 0)} ms</div>
       <div style="line-height:1.6;font-size:13px;white-space:pre-wrap;max-height:260px;overflow:auto">${agentic.data.answer || ''}</div>`
    : `<div class="panel-title">Agentic</div><div class="text-danger">Erreur: ${agentic.error}</div>`;

  const delta = (agentic.elapsed - classic.elapsed).toFixed(1);
  const deltaLabel = Number(delta) >= 0 ? `+${delta}` : `${delta}`;

  target.innerHTML = `
    <div class="panel" style="margin-top:12px">
      <div class="panel-title">Comparateur Classique vs Agentic</div>
      <div class="text-muted" style="font-size:12px;margin-bottom:12px">Delta latence (agentic - classique): ${deltaLabel} ms</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="panel" style="margin:0">${classicSummary}</div>
        <div class="panel" style="margin:0">${agenticSummary}</div>
      </div>
    </div>
    ${agentic.ok ? renderAgenticMeta(agentic.data) : ''}
  `;
}

async function doSearch() {
  const q = document.getElementById('q-input').value.trim();
  if (!q) return;
  const lang = document.getElementById('q-lang').value || null;
  const results = document.getElementById('search-results');
  results.innerHTML = '<div class="loading-text"><span class="loading"></span></div>';
  try {
    const r = await api.post('/search', {query: q, top_k: 10, language_filter: lang||null});
    if (!r.results.length) { results.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Aucun résultat</p></div>'; return; }
    results.innerHTML = r.results.map(res => `
      <div class="panel" style="margin-bottom:10px">
        <div class="flex gap-8 items-center" style="justify-content:space-between;margin-bottom:8px">
          <div class="flex gap-8 items-center">

          </div>
          <div class="text-muted" style="font-size:11px">${res.filename} · p.${res.page_number||'?'}</div>
        </div>
        ${res.section?`<div style="font-size:11px;color:var(--accent2);margin-bottom:6px">📌 ${res.section}</div>`:''}
        <div style="font-size:13px;line-height:1.6">${res.text.slice(0,400)}${res.text.length>400?'…':''}</div>
      </div>`).join('');
  } catch(e) { results.innerHTML = `<div class="empty">${e.message}</div>`; }
}

async function renderCases(c, skip=0, filterStatus='', filterPriority=''){

  const [cases, summary] = await Promise.all([api.get(path), api.get('/cases/summary').catch(()=>({}))]);
  const stats = [
    {label:'Ouverts', value:summary.by_status?.open||0, key:'open'},
    {label:'En cours', value:summary.by_status?.in_progress||0, key:'in_progress'},
    {label:'En revue', value:summary.by_status?.under_review||0, key:'under_review'},
    {label:'Résolus', value:summary.by_status?.resolved||0, key:'resolved'},

    <div class="btn-group">
      ${statusFilters.map(f=>`<button class="btn btn-sm ${filterStatus===f.k?'btn-primary':'btn-secondary'}" onclick="filterCasesList('${f.k}','${filterPriority}')">${f.l}</button>`).join('')}
      <span style="border-left:1px solid var(--border);margin:0 4px"></span>
      ${priorityFilters.map(f=>`<button class="btn btn-sm ${filterPriority===f.k?'btn-primary':'btn-secondary'}" onclick="filterCasesList('${filterStatus}','${f.k}')">${f.l}</button>`).join('')}
    </div>
    <div class="table-wrap"><table><thead><tr><th>Titre</th><th>Statut</th><th>Priorité</th><th>Assigné</th><th>MàJ</th><th>Actions</th></tr></thead><tbody>

    </tbody></table></div>
    ${paginationHtml(cases.total, skip, 25, `casesPage_${filterStatus}_${filterPriority}`)}`;

function showCaseTab(tab){
  const container = document.getElementById('case-tab-content');
  document.querySelectorAll('#case-tabs button').forEach(b=>{
    const isActive = b.textContent.toLowerCase().includes(tab);
    b.className = `btn btn-sm ${isActive?'btn-primary':'btn-secondary'}`;
  });
  if(tab==='conversation') renderCaseConversation(container);
  else if(tab==='documents') renderCaseDocuments(container);
  else if(tab==='findings') renderCaseFindings(container);
  else if(tab==='actions') renderCaseActions(container);
  else if(tab==='orchestrate') renderCaseOrchestrate(container);
}

async function sendCaseMessage(){
  const input = document.getElementById('case-msg-input');
  if(!input.value.trim()) return;
  const btn = input.parentElement.querySelector('button');
  if(btn){ btn.disabled=true; btn.textContent='Envoi…'; }
  try{
    await api.post(`/cases/${activeCaseId}/converse`, {content: input.value});
    input.value = ''; showCaseTab('conversation'); toast('Message envoyé','success');
  }catch(e){ toast(e.message,'error'); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='Envoyer'; } }
}

async function loadPosture(profileId){

  container.innerHTML = '<div class="loading-text"><span class="loading"></span></div>';
  try{
    const [posture, gaps, roadmap] = await Promise.all([
      api.get(`/compliance/posture/${pid}`).catch(()=>null),
      api.get(`/compliance/gaps/${pid}`).catch(()=>({gaps:[]})),
      api.get(`/company-profiles/${pid}/roadmap`).catch(()=>null)

    if(!posture){ container.innerHTML = '<div class="empty">Impossible de charger la posture</div>'; return; }
    const pct = posture.overall_coverage_score||0;
    const chartId = 'posture-chart-'+pid.replace(/[^a-z0-9]/gi,'');
    container.innerHTML = `
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card" style="text-align:center"><div class="stat-value" style="font-size:32px;color:${pct>=0.8?'var(--success)':pct>=0.5?'var(--warn)':'var(--danger)'}">${(pct*100).toFixed(0)}%</div><div class="stat-label">Couverture globale</div></div>
        <div class="stat-card" style="text-align:center"><div class="stat-value" style="font-size:32px">${posture.total_applicable||0}</div><div class="stat-label">Exigences applicables</div></div>
        <div class="stat-card" style="text-align:center"><div class="stat-value" style="font-size:32px">${posture.fully_covered||0}</div><div class="stat-label">Couvertes</div></div>
        <div class="stat-card" style="text-align:center"><div class="stat-value" style="font-size:32px">${posture.not_covered||0}</div><div class="stat-label">Non couvertes</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-top:16px">
        <div class="panel"><div class="panel-title">Répartition</div><canvas id="${chartId}" height="200"></canvas></div>
        <div class="panel"><div class="panel-title">Écarts (${posture.gaps?.length||0})</div>
          ${posture.gaps?.length?posture.gaps.slice(0,10).map(g=>`<div class="audit-item"><div class="audit-dot audit-dot-${g.coverage_status}"></div><div><div class="flex gap-8 items-center"><span class="audit-event">${escapeHtml(g.exigence_title||g.exigence_id||'Exigence')}</span>${tag(g.coverage_status,g.coverage_status)}</div><div class="audit-detail">Score: ${(g.best_coverage_score*100).toFixed(0)}% · Contrôles liés: ${g.linked_controls}${g.has_exception?' · Exception':''}</div></div></div>`).join(''):'<div class="empty">Aucun écart majeur</div>'}
        </div>
      </div>
      <div class="panel" style="margin-top:16px"><div class="panel-title">Feuille de route (${roadmap?roadmap.roadmap.length:0})</div>
        ${roadmap?roadmap.roadmap.slice(0,8).map((step,i)=>`<div class="roadmap-item"><div class="roadmap-header"><span class="roadmap-pos">${i+1}</span><div style="flex:1"><div class="roadmap-action">${escapeHtml(step.action_summary||step.action_id)}</div><div class="roadmap-meta">${tag(step.criticality_level||'—',step.criticality_level||'—')} ${fmtDate(step.suggested_due_date)}</div></div></div></div>`).join(''):'<div class="empty">Aucune roadmap</div>'}
      </div>`;
    setTimeout(()=>{
      const ctx = document.getElementById(chartId);
      if(ctx && Chart){
        new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['Couvertes','Partielles','Non couvertes','Exceptions'],
            datasets: [{ data: [posture.fully_covered||0, posture.partially_covered||0, posture.not_covered||0, posture.excepted||0], backgroundColor: ['#34d399','#fbbf24','#f87171','#60a5fa'], borderWidth:0 }]
          },
          options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{color:'#9896a8',font:{size:11}}}}, cutout:'65%' }
        });
      }
    }, 50);
  }catch(e){ container.innerHTML = `<div class="empty">${e.message}</div>`; }
}

    <div class="table-wrap"><table><thead><tr><th>Titre</th><th>Type</th><th>Statut</th><th>Risk</th><th>Expiry</th><th>Justification</th></tr></thead><tbody>
      ${data.exceptions.map(ex=>`<tr><td><strong>${escapeHtml(ex.title)}</strong></td><td>${fmt(ex.exception_type)}</td><td>${tag(ex.status,ex.status)}</td><td>${tag(ex.risk_level,ex.risk_level)}</td><td>${fmtDate(ex.expiry_date)}</td><td style="max-width:200px;font-size:12px;color:var(--text3)">${escapeHtml(ex.justification||'').slice(0,80)}</td></tr>`).join('')}
    </tbody></table></div>`;
}

// ── Modal close ────────────────────────────────────────────────────────
function closeModal() {
  document.querySelectorAll('.modal-bg').forEach(m => m.remove());
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ── Init ───────────────────────────────────────────────────────────────
(async () => {
  try {
    await api.get('/admin/stats');
    document.getElementById('api-status').textContent = '🟢 Connecté';
    document.getElementById('api-status').className = 'badge badge-success';
  } catch(e) {
    document.getElementById('api-status').textContent = '🔴 Hors ligne';
    document.getElementById('api-status').className = 'badge badge-warn';
  }
  await render('dashboard');
})();
</script>
</body>
