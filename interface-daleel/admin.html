<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daleel Admin — Plateforme de Conformité</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a2e; --card: #16162a;
  --accent: #7c5cfc; --accent2: #a78bfa; --accent-glow: rgba(124,92,252,.15);
  --text: #e8e6f0; --text2: #9896a8; --text3: #6b6980;
  --border: #2a2a40; --success: #34d399; --warn: #fbbf24; --danger: #f87171;
  --info: #60a5fa; --shadow: 0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}

/* Sidebar */
.sidebar{width:300px;background:#111019;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{height:98px;padding:12px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.sidebar-brand-logo{width:100%;max-width:190px;height:72px;object-fit:contain;object-position:left center;display:block}
.nav{padding:24px 0 16px;flex:1;overflow-y:auto}
.nav-group{margin-bottom:18px}
.nav-group-title{padding:0 23px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#7e769b}
.nav-item{height:50px;display:flex;align-items:center;gap:14px;padding:0 23px;cursor:pointer;transition:.15s;color:#b7b3c7;border-left:4px solid transparent;font-size:14px}
.nav-item:hover{background:rgba(124,92,252,.12);color:#fff}
.nav-item.active{background:#2a2246;color:var(--accent);border-left-color:var(--accent)}
.nav-item .icon{width:22px;text-align:center;font-size:17px;line-height:1}
.sidebar-footer{padding:16px 22px 14px;background:#181829;border-top:1px solid var(--border)}
.footer-profile{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.footer-avatar{width:43px;height:43px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;box-shadow:0 8px 22px rgba(124,92,252,.28)}
.footer-name{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.footer-role{font-size:13px;color:var(--accent2);line-height:1.35}
.footer-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.footer-btn{height:34px;border-radius:9px;border:1px solid var(--border);background:#151527;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.footer-btn:hover{border-color:var(--accent);color:var(--accent2)}
.footer-btn-danger{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.35);color:#ff7f8d}
.footer-btn-danger:hover{background:rgba(248,113,113,.18);border-color:rgba(248,113,113,.55);color:#ff9aa5}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.notification-wrap{position:relative}
.notification-btn{height:32px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text);padding:0 10px;display:flex;align-items:center;gap:6px;cursor:pointer}
.notification-count{min-width:18px;height:18px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;display:none;align-items:center;justify-content:center;padding:0 5px}
.notification-menu{position:absolute;right:0;top:40px;width:390px;max-height:460px;overflow:auto;background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);z-index:100;display:none}
.notification-menu.open{display:block}
.notification-menu-head{padding:12px 14px;border-bottom:1px solid var(--border);font-weight:700}
.notification-item{padding:12px 14px;border-bottom:1px solid rgba(42,42,64,.65)}
.notification-item:last-child{border-bottom:none}
.notification-title{font-size:13px;font-weight:700;margin-bottom:4px}
.notification-msg{font-size:12px;color:var(--text2);line-height:1.35}
.notification-actions{display:flex;gap:8px;margin-top:10px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(52,211,153,.15);color:var(--success)}
.badge-warn{background:rgba(251,191,36,.15);color:var(--warn)}
.badge-info{background:rgba(96,165,250,.15);color:var(--info)}
.content{flex:1;overflow-y:auto;padding:24px}

/* Cards & Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:.2s}
.stat-card:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.stat-icon{font-size:24px;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:700;color:var(--accent2)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}

/* Tables */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:10px 14px;border-bottom:1px solid rgba(42,42,64,.5);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(124,92,252,.05)}

/* Forms */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
label{font-size:12px;color:var(--text2);font-weight:500}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(248,113,113,.15);color:var(--danger);border:1px solid rgba(248,113,113,.3)}.btn-danger:hover{background:rgba(248,113,113,.25)}
.btn-success{background:rgba(52,211,153,.15);color:var(--success);border:1px solid rgba(52,211,153,.3)}.btn-success:hover{background:rgba(52,211,153,.25)}
.btn-warn{background:rgba(251,191,36,.15);color:var(--warn);border:1px solid rgba(251,191,36,.3)}.btn-warn:hover{background:rgba(251,191,36,.25)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

/* Section headers */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:18px;font-weight:600}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:20px}

/* Status badges */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-active{background:rgba(52,211,153,.15);color:var(--success)}
.tag-pending{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-pending_approval{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-approved{background:rgba(52,211,153,.15);color:var(--success)}
.tag-applied{background:rgba(96,165,250,.15);color:var(--info)}
.tag-rejected,.tag-error{background:rgba(248,113,113,.15);color:var(--danger)}
.tag-superseded{background:rgba(107,105,128,.2);color:var(--text2)}
.tag-repealed{background:rgba(248,113,113,.1);color:var(--danger)}
.tag-critique{background:rgba(248,113,113,.15);color:var(--danger)}
.tag-importante{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-secondaire{background:rgba(52,211,153,.15);color:var(--success)}
.tag-modificatif{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-loi_principale{background:rgba(96,165,250,.15);color:var(--info)}
/* Case status / priority badges */
.tag-open{background:rgba(96,165,250,.15);color:var(--info)}
.tag-in_progress{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-under_review{background:rgba(124,92,252,.15);color:var(--accent2)}
.tag-resolved{background:rgba(52,211,153,.15);color:var(--success)}
.tag-closed{background:rgba(107,105,128,.15);color:var(--text3)}
.tag-critical{background:rgba(248,113,113,.2);color:var(--danger)}
.tag-high{background:rgba(251,191,36,.15);color:var(--warn)}
.tag-medium{background:rgba(96,165,250,.15);color:var(--info)}
.tag-low{background:rgba(107,105,128,.15);color:var(--text3)}

/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg3)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-glow)}
.upload-zone input{display:none}
.upload-zone-text{color:var(--text2);margin-top:8px;font-size:13px}

/* Step workflow */
.steps{display:flex;gap:0;margin-bottom:24px;overflow-x:auto}
.step{flex:1;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-right:none;cursor:pointer;font-size:13px;transition:.2s;min-width:120px;text-align:center}
.step:first-child{border-radius:8px 0 0 8px}
.step:last-child{border-right:1px solid var(--border);border-radius:0 8px 8px 0}
.step.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
.step.done{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:var(--success)}
.step-num{display:block;font-size:18px;font-weight:700;margin-bottom:2px}
.step-lbl{font-size:11px;color:inherit}

/* Panel */
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.panel-title{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--accent2)}

/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;animation:slideIn .2s ease;display:flex;align-items:center;gap:8px;max-width:360px;box-shadow:var(--shadow)}
.toast-success{background:#064e3b;color:var(--success);border:1px solid rgba(52,211,153,.3)}
.toast-error{background:#450a0a;color:var(--danger);border:1px solid rgba(248,113,113,.3)}
.toast-info{background:#1e3a5f;color:var(--info);border:1px solid rgba(96,165,250,.3)}
.toast-warn{background:#4a3207;color:var(--warn);border:1px solid rgba(251,191,36,.3)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Audit timeline */
.audit-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,42,64,.5)}
.audit-item:last-child{border-bottom:none}
.audit-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.audit-dot-applied{background:var(--success)}
.audit-dot-superseded{background:var(--warn)}
.audit-dot-repealed,.audit-dot-rejected{background:var(--danger)}
.audit-dot-extracted{background:var(--info)}
.audit-dot-classified{background:var(--accent)}
.audit-dot-recalculation{background:var(--accent2)}
.audit-dot-default{background:var(--text2)}
.audit-time{font-size:11px;color:var(--text3)}
.audit-event{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.audit-detail{font-size:12px;color:var(--text2)}

/* Roadmap */
.roadmap-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;transition:.2s}
.roadmap-item:hover{border-color:var(--accent)}
.roadmap-pos{display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;text-align:center;line-height:28px;font-size:12px;font-weight:700;margin-right:10px;flex-shrink:0}
.roadmap-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.roadmap-action{font-size:13px;font-weight:500;flex:1}
.roadmap-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--text2)}
.roadmap-conditions{margin-top:8px;font-size:12px;color:var(--text2)}
.roadmap-preuve{margin-top:6px;font-size:12px;color:var(--success);padding:6px 10px;background:rgba(52,211,153,.08);border-radius:6px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;min-width:340px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* Loading */
.loading{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text2);font-size:13px;display:flex;align-items:center;gap:8px;padding:20px 0}

/* Empty state */
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* Misc */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.text-muted{color:var(--text2)}
.text-success{color:var(--success)}
.text-danger{color:var(--danger)}
.text-warn{color:var(--warn)}
.text-info{color:var(--info)}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.items-center{align-items:center}
.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}
.w-full{width:100%}
pre{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px;overflow-x:auto;white-space:pre-wrap;color:var(--text2)}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;padding:8px 0}
.pagination .btn{min-width:36px;justify-content:center}
.pagination .page-info{font-size:12px;color:var(--text2)}
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <img class="sidebar-brand-logo" src="/static/daleel-logo.svg?v=20260524" alt="Daleel">
  </div>
  <div class="nav" id="nav"></div>
  <div class="sidebar-footer" id="sidebar-footer"></div>
</nav>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-right">
      <div class="notification-wrap" id="notification-wrap" style="display:none">
        <button class="notification-btn" onclick="toggleNotificationMenu()">🔔 <span id="notification-count" class="notification-count">0</span></button>
        <div class="notification-menu" id="notification-menu">
          <div class="notification-menu-head">Notifications</div>
          <div id="notification-list"><div class="empty">Chargement...</div></div>
        </div>
      </div>
      <span class="badge badge-success" id="api-status" data-i18n="common.online">En ligne</span>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading-text"><span class="loading"></span> Chargement…</div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script src="/static/auth-guard.js"></script>
<script>if(typeof AuthGuard==='undefined')document.write('<script src="./auth-guard.js"><\/script>');</script>
<script src="/static/i18n.js?v=20260518c"></script>
<script>if(typeof DaleelI18n==='undefined')document.write('<script src="./i18n.js?v=20260518c"><\/script>');</script>
<script>
const API = '/api/v1';
let currentSection = 'dashboard';
const PAGE_SIZE = 25;

function tr(key, params = {}) {
  return window.DaleelI18n ? DaleelI18n.t(key, params) : key;
}

function updateAdminChrome() {
  document.title = tr('admin.title');
  const title = document.getElementById('topbar-title');
  if (title) title.textContent = sectionTitle(currentSection);
  if (window.DaleelI18n) DaleelI18n.apply(document);
}

// ── Pagination helper ─────────────────────────────────────────────────
function paginationHtml(total, skip, pageSize, onPageFn) {
  const page = Math.floor(skip / pageSize) + 1;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const hasPrev = page > 1;
  const hasNext = page < totalPages;
  return `<div class="pagination">
    <button class="btn btn-secondary btn-sm" ${hasPrev ? `onclick="${onPageFn}(${(page-2)*pageSize})"` : 'disabled'}>&laquo; ${tr('common.previous')}</button>
    <span class="page-info">${tr('common.page')} ${page} / ${totalPages} (${total} ${tr('common.total')})</span>
    <button class="btn btn-secondary btn-sm" ${hasNext ? `onclick="${onPageFn}(${page*pageSize})"` : 'disabled'}>${tr('common.next')} &raquo;</button>
  </div>`;
}

// ── Toast ──────────────────────────────────────────────────────────────
function toast(msg, type='info', dur=4000) {
  const t = document.getElementById('toasts');
  const d = document.createElement('div');
  d.className = `toast toast-${type}`;
  const icons = {success:'✅', error:'❌', info:'ℹ️', warn:'⚠️'};
  d.innerHTML = `<span>${icons[type]||'•'}</span><span>${msg}</span>`;
  t.appendChild(d);
  setTimeout(() => d.remove(), dur);
}

// ── API layer ──────────────────────────────────────────────────────────
async function apiFetch(path, opts={}) {
  try {
    const request = typeof AuthGuard !== 'undefined' ? AuthGuard.authFetch : fetch;
    const {headers = {}, ...rest} = opts;
    const r = await request(API + path, {
      ...rest,
      headers: {'Content-Type':'application/json', ...headers},
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({detail: r.statusText}));
      throw new Error(err.detail || r.statusText);
    }
    if (r.status === 204) return null;
    return r.json();
  } catch(e) {
    throw e;
  }
}
const api = {
  get: (p) => apiFetch(p),
  post: (p, b) => apiFetch(p, {method:'POST', body: b !== undefined ? JSON.stringify(b) : undefined}),
  patch: (p, b) => apiFetch(p, {method:'PATCH', body: JSON.stringify(b)}),
  del: (p) => apiFetch(p, {method:'DELETE'}),
  upload: async (p, formData) => {
    const request = typeof AuthGuard !== 'undefined' ? AuthGuard.authFetch : fetch;
    const r = await request(API + p, {method:'POST', body: formData});
    if(!r.ok){ const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail||r.statusText); }
    if(r.status===204) return null;
    return r.json();
  },
};

async function authApiFetch(path, opts={}) {
  if (typeof AuthGuard === 'undefined') throw new Error('Authentification indisponible');
  const r = await AuthGuard.authFetch(API + path, {
    ...opts,
    headers: {'Content-Type':'application/json', ...opts.headers},
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({detail: r.statusText}));
    throw new Error(err.detail || r.statusText);
  }
  if (r.status === 204) return null;
  return r.json();
}

const authApi = {
  get: (p) => authApiFetch(p),
  post: (p, b) => authApiFetch(p, {method:'POST', body: b !== undefined ? JSON.stringify(b) : undefined}),
  put: (p, b) => authApiFetch(p, {method:'PUT', body: JSON.stringify(b)}),
  del: (p) => authApiFetch(p, {method:'DELETE'}),
};

async function uploadFile(path, file, extra={}) {
  const fd = new FormData();
  fd.append('file', file);
  Object.entries(extra).forEach(([k,v]) => fd.append(k, v));
  const request = typeof AuthGuard !== 'undefined' ? AuthGuard.authFetch : fetch;
  const r = await request(API + path, {method:'POST', body: fd});
  if (!r.ok) { const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail); }
  return r.json();
}

// ── Navigation ─────────────────────────────────────────────────────────
function isApprovalNotification(n) {
  return String(n.alert_type || '').startsWith('approval_') && !n.read;
}

function toggleNotificationMenu() {
  const menu = document.getElementById('notification-menu');
  menu.classList.toggle('open');
  if (menu.classList.contains('open')) loadHeaderNotifications();
}

async function loadHeaderNotifications() {
  const currentUser = typeof AuthGuard !== 'undefined' ? AuthGuard.getUser() : null;
  const wrap = document.getElementById('notification-wrap');
  if (!wrap || !['super_admin', 'owner', 'admin'].includes(currentUser?.role)) return;
  wrap.style.display = 'block';

  const countEl = document.getElementById('notification-count');
  const listEl = document.getElementById('notification-list');
  try {
    const notifEndpoint = currentUser?.role === 'super_admin' ? '/admin/notifications?limit=30' : '/notifications/mine?limit=30';
    const data = await api.get(notifEndpoint);
    const notifications = data.notifications || [];
    const approvals = notifications.filter(isApprovalNotification);
    countEl.textContent = approvals.length;
    countEl.style.display = approvals.length ? 'inline-flex' : 'none';

    if (!notifications.length) {
      listEl.innerHTML = '<div class="empty">Aucune notification</div>';
      return;
    }

    listEl.innerHTML = notifications.slice(0, 20).map(n => {
      const approval = isApprovalNotification(n);
      return `<div class="notification-item">
        <div class="notification-title">${escapeHtml(n.title || 'Notification')} ${approval ? tag('pending_approval', 'pending_approval') : ''}</div>
        <div class="notification-msg">${escapeHtml(n.message || '')}</div>
        <div class="text-muted" style="font-size:11px;margin-top:6px">${fmtDate(n.created_at)}</div>
        ${approval ? `<div class="notification-actions">
          <button class="btn btn-success btn-sm" onclick="approveNotification('${n.id}')">Approuver</button>
          <button class="btn btn-danger btn-sm" onclick="rejectNotification('${n.id}')">Refuser</button>
        </div>` : ''}
      </div>`;
    }).join('');
  } catch(e) {
    listEl.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
  }
}

// ── Helper renderers ───────────────────────────────────────────────────
function trMaybe(key) {
  const value = tr(key);
  return value === key ? null : value;
}
function enumKey(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[’']/g, '')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '');
}
function enumLabel(value) {
  if (value === null || value === undefined || value === '') return '—';
  const raw = String(value);
  const key = enumKey(raw);
  const aliases = {
    non_analyse: 'not_analyzed',
    non_analyzed: 'not_analyzed',
    not_analysed: 'not_analyzed',
  };
  const keys = [...new Set([key, aliases[key]].filter(Boolean))];
  for (const k of keys) {
    for (const prefix of ['role', 'status', 'priority', 'severity', 'docRole', 'subscription', 'auth.sector', 'auth.size']) {
      const translated = trMaybe(`${prefix}.${k}`);
      if (translated) return translated;
    }
  }
  return raw.replace(/_/g, ' ');
}
function tag(text, cls='') {
  const raw = text ?? '—';
  const label = enumLabel(raw);
  const className = String(cls || raw).toLowerCase().replace(/[^a-z0-9_-]+/g, '_');
  return `<span class="tag tag-${className}">${escapeHtml(label)}</span>`;
}
function btn(label, onclick, cls='secondary', sm=false) {
  return `<button class="btn btn-${cls}${sm?' btn-sm':''}" onclick="${onclick}">${label}</button>`;
}
function fmt(v) { return v ?? '—'; }
function fmtEnum(v) { return enumLabel(v); }
function fmtNumber(v, digits=1) {
  const n = Number(v);
  return Number.isFinite(n) ? n.toFixed(digits) : fmt(v);
}
function fmtScore(v, digits=3) { return fmtNumber(v, digits); }
function fmtMs(v) { return fmtNumber(v ?? 0, 1); }
function getSummaryContext(summary) {
  return summary?.context || summary || {};
}
function fmtDate(d) {
  if (!d) return '—';
  const locale = DaleelI18n?.getLang?.() || 'fr';
  return new Date(d).toLocaleString(locale, {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

async function renderAmendements(c) {

function renderAmendContent(container) {
  if (aState.step === 'upload') {
    container.innerHTML = `
      <div class="panel">
        <div class="panel-title">${tr('admin.amendments.uploadTitle')}</div>
        <p class="text-muted" style="margin-bottom:16px">${tr('admin.amendments.uploadDescription')}</p>
        <div class="form-group"><label>${tr('admin.amendments.documentLabel')}</label>
          <div id="a-drop" style="border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:border-color .2s">
            <div style="font-size:28px;margin-bottom:8px">📄</div>
            <p style="margin:0;color:var(--text2)">${tr('admin.amendments.dropPrefix')} <span style="color:var(--primary);text-decoration:underline">${tr('admin.amendments.browse')}</span></p>
            <p id="a-file-name" style="margin:4px 0 0;font-weight:600;color:var(--text1)"></p>
            <input type="file" id="a-file" accept=".pdf,.docx,.doc,.txt" style="display:none">
          </div>
        </div>
        <button class="btn btn-primary" id="a-upload-btn" onclick="doAmendUpload()" style="margin-top:12px">${tr('admin.amendments.compareUpdate')}</button>
      </div>`;

    const drop = document.getElementById('a-drop');
    const fileInput = document.getElementById('a-file');
    drop.onclick = () => fileInput.click();
    fileInput.onchange = () => {
      if (fileInput.files.length) document.getElementById('a-file-name').textContent = fileInput.files[0].name;
    };
    drop.ondragover = e => { e.preventDefault(); drop.style.borderColor = 'var(--primary)'; };
    drop.ondragleave = () => { drop.style.borderColor = 'var(--border)'; };
    drop.ondrop = e => {
      e.preventDefault(); drop.style.borderColor = 'var(--border)';
      if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; document.getElementById('a-file-name').textContent = e.dataTransfer.files[0].name; }
    };
  } else if (aState.step === 'result') {
    const r = aState.result;
    const d = r.diff;
    const total = d.added + d.modified + d.removed + d.unchanged;
    const ops = r.operations || [];

    const opsHtml = ops.length ? `
      <div class="table-wrap" style="margin-top:16px"><table>
        <thead><tr><th>Opération</th><th>Article</th><th>Détails</th></tr></thead>
        <tbody>
          ${ops.map(op => `<tr>
            <td>${tag(op.type, op.type === 'ADD' ? 'active' : op.type === 'REPEAL' ? 'error' : 'pending')}</td>
            <td><code>${op.article_key}</code></td>
            <td style="font-size:12px;color:var(--text2)">Art. ${op.article_number}${op.new_version_id ? ' (nouvelle version)' : ''}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>` : '';

    container.innerHTML = `
      <div class="panel">
        <div class="panel-title">Résultat de la comparaison</div>
        <p class="text-muted mb-16">${r.message}</p>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px">
          <div class="stat-card" style="border-left:3px solid #22c55e"><div class="stat-value">${d.added}</div><div class="stat-label">Ajoutés</div></div>
          <div class="stat-card" style="border-left:3px solid #f59e0b"><div class="stat-value">${d.modified}</div><div class="stat-label">Modifiés</div></div>
          <div class="stat-card" style="border-left:3px solid #ef4444"><div class="stat-value">${d.removed}</div><div class="stat-label">Supprimés</div></div>
          <div class="stat-card" style="border-left:3px solid #6b7280"><div class="stat-value">${d.unchanged}</div><div class="stat-label">Inchangés</div></div>
          <div class="stat-card" style="border-left:3px solid #3b82f6"><div class="stat-value">${r.notifications_sent || 0}</div><div class="stat-label">Notifiés</div></div>
        </div>
        ${(r.notifications_sent || 0) > 0 ? `<p style="font-size:12px;color:var(--primary);margin-bottom:8px">🔔 ${r.notifications_sent} profil(s) entreprise notifié(s) du changement.</p>` : ''}
        ${r.old_document_id ? `<p style="font-size:12px;color:var(--text2)">Ancien document <code>${r.old_document_id}</code> remplacé.</p>` : '<p style="font-size:12px;color:var(--text2)">Aucun document existant trouvé — nouveau document créé.</p>'}
        ${opsHtml}
        <div class="btn-group mt-16">
          ${aState.loiId ? `<button class="btn btn-primary" onclick="doAmendRecalc()">Recalculer exigences</button>` : ''}
          <button class="btn btn-secondary" onclick="aState={step:'upload',loiId:null,result:null};navigate('amendements')">Nouvel amendement</button>
        </div>
      </div>`;
  }
}

async function doAmendUpload() {
  const fileInput = document.getElementById('a-file');
  if (!fileInput.files.length) { toast('Sélectionnez un fichier', 'error'); return; }

  toast('Traitement en cours — détection de la loi, extraction, comparaison, mise à jour…', 'info', 30000);
  try {
    const r = await uploadFile('/documents/upload-amendment', fileInput.files[0]);

    const loiId = r.document?.loi_id || null;
    if (r.document?.status === 'pending_approval') {
      toast('Amendement envoyé au super admin pour approbation', 'info', 7000);
      await loadHeaderNotifications();
    } else {
      const notifMsg = r.notifications_sent ? ` · ${r.notifications_sent} profil(s) notifié(s)` : '';
      toast(`Mise à jour terminée: ${r.diff.added} ajoutés, ${r.diff.modified} modifiés, ${r.diff.removed} supprimés${notifMsg}`, 'success', 8000);
    }
    aState = {step: 'result', loiId, result: r};
    navigate('amendements');
  } catch(e) { toast(e.message, 'error'); }
}

async function doAmendRecalc() {
  toast('Recalcul en cours…', 'info', 20000);
  try {
    const r = await api.post('/lois/' + aState.loiId + '/recalculate');
    toast(`${r.versions_processed} versions · ${r.exigences_extracted} exigences · ${r.actions_extracted} actions`, 'success', 8000);
  } catch(e) { toast(e.message, 'error'); }
}

// HISTORIQUE DES CONVERSATIONS
// ══════════════════════════════════════════════════════════════════════
let histState = {skip: 0, filterUser: ''};

async function renderHistorique(c) {
  const user = AuthGuard.getUser();
  if (!user) { c.innerHTML = '<div class="empty"><div class="empty-icon">🔒</div><p>Connectez-vous pour voir l\'historique.</p></div>'; return; }
  if (user.role === 'super_admin') { c.innerHTML = '<div class="empty"><div class="empty-icon">🚫</div><p>Accès non autorisé pour les super admins.</p></div>'; return; }

  const isAdmin = ['admin','owner'].includes(user.role);
  const params = new URLSearchParams({skip: histState.skip, limit: PAGE_SIZE});
  if (isAdmin && histState.filterUser) params.append('user_id', histState.filterUser);

  let data;
  try {
    const res = await AuthGuard.authFetch(API + '/chat-history?' + params);
    if (res.status === 403) { c.innerHTML = '<div class="empty"><div class="empty-icon">🚫</div><p>Accès refusé.</p></div>'; return; }
    if (!res.ok) throw new Error('Erreur ' + res.status);
    data = await res.json();
  } catch(e) { c.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`; return; }

  const entries = data.entries || [];
  let memberOptions = `<option value="">${tr('admin.history.allMembers')}</option>`;
  if (isAdmin && entries.length) {
    const seen = new Set();
    entries.forEach(e => { if (e.user_id && !seen.has(e.user_id)) { seen.add(e.user_id); memberOptions += `<option value="${e.user_id}" ${histState.filterUser===e.user_id?'selected':''}>${escapeHtml(e.user_name||e.user_id)}</option>`; }});
  }
  const filterHtml = isAdmin ? `
    <div style="display:flex;justify-content:flex-end">
      <select style="min-width:180px" onchange="histState.filterUser=this.value;histState.skip=0;navigate('historique')">${memberOptions}</select>
    </div>` : '';

  const tableHtml = entries.length ? `
    <div class="table-wrap"><table>
      <thead><tr>
        ${isAdmin ? `<th>${tr('admin.history.user')}</th>` : ''}
        <th>${tr('admin.history.question')}</th><th>${tr('admin.history.answerPreview')}</th><th>${tr('admin.history.sources')}</th><th>${tr('admin.history.date')}</th>
      </tr></thead>
      <tbody>
        ${entries.map(e => `<tr>
          ${isAdmin ? `<td style="font-size:12px">${e.user_name || '?'}</td>` : ''}
          <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.question || '—'}</td>
          <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text2)">${(e.answer||'').slice(0,120)}</td>
          <td>${e.sources_count ?? '—'}</td>
          <td style="font-size:12px;color:var(--text2)">${fmtDate(e.created_at)}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>
    ${paginationHtml(data.total, histState.skip, PAGE_SIZE, 'histPage')}` : `<div class="empty"><div class="empty-icon">🕐</div><p>${tr('admin.history.none')}</p></div>${paginationHtml(0, 0, PAGE_SIZE, "histPage")}`;

  c.innerHTML = `
    <div class="section-header"><span class="section-title">${tr('admin.history.title')} (${data.total})</span>${filterHtml}</div>
    ${tableHtml}`;
}

function histPage(skip) { histState.skip = skip; navigate('historique'); }

      api.get('/company-profiles/'+id),
      api.get('/company-profiles/'+id+'/applicabilities/summary').catch(()=>null),
      api.get('/company-profiles/'+id+'/roadmap').catch(()=>null),

    const summaryHtml = summary ? `
      <div class="flex gap-12" style="flex-wrap:wrap;margin-bottom:16px">

          <div class="stat-card" style="min-width:120px;flex:1">

      roadmapHtml = Object.entries(byLevel).filter(([,v])=>v.length).map(([level, actions]) => `
        <div style="margin-bottom:20px">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px">${tag(level,level)} ${actions.length} action(s)</div>

              <span class="roadmap-pos">${a.position}</span>

                <div class="roadmap-action">${a.action_precise}</div>

function chooseModeAutomatically(question='') {
  const q = (question || '').toLowerCase();

  const agenticHints = [
    'conseil','conseils','advice','solution','plan','plan d\'action','etapes','étapes',
    'comment faire','priorité','priorite','exigence','exigences','conformité','conformite',
    'applicable','obligation','obligations','risque','audit','roadmap','recommandation',
    'نصيحة','حل','خطة','متطلبات','امتثال','قابل للتطبيق','واجب'
  ];

  const shouldUseAgentic =
    q.length > 220 ||
    agenticHints.some(h => q.includes(h)) ||
    q.includes('?') && (q.includes('comment') || q.includes('how'));

  return shouldUseAgentic ? 'agentic' : 'classic';
}

async function doAsk() {
  const q = document.getElementById('ask-input').value.trim();
  if (!q) return;

  const mode = document.getElementById('ask-mode').value;
  const effectiveMode = mode === 'auto' ? 'auto' : mode;
  const lang = document.getElementById('ask-lang').value || null;
  const topK = Math.max(1, Math.min(20, parseInt(document.getElementById('ask-topk').value || '5', 10)));
  const target = document.getElementById('ask-results');
  const compareTarget = document.getElementById('ask-compare');
  compareTarget.innerHTML = '';

  target.innerHTML = '<div class="loading-text"><span class="loading"></span> Génération de la reponse…</div>';

  try {
    const endpoint = effectiveMode === 'auto' ? '/ask-auto' : (effectiveMode === 'agentic' ? '/ask-agentic' : '/ask');
    const payload = {
      question: q,
      top_k: topK,
      language_filter: lang,
      document_id: null,
      temperature: 0.3,
      history: []
    };
    const r = await api.post(endpoint, payload);

    if (mode === 'auto') {
      const modeLabel = (r.selected_mode || 'classic') === 'agentic' ? 'agentic' : 'classique';
      const reason = r.auto_reason ? ` (${r.auto_reason})` : '';
      toast(`Mode auto: ${modeLabel} sélectionné${reason}`, 'info', 2800);
    }

    const usedMode = mode === 'auto' ? (r.selected_mode || 'classic') : effectiveMode;

    target.innerHTML = `
      <div class="panel">
        <div class="panel-title">reponse (${usedMode === 'agentic' ? 'Agentic' : 'Classique'})</div>
        <div style="line-height:1.7;font-size:13px;white-space:pre-wrap">${r.answer || ''}</div>
      </div>
      <div class="panel">
        <div class="panel-title">Sources (${r.chunks_used || 0} chunks)</div>
        ${renderAskSources(r.sources || [])}
      </div>
      ${usedMode === 'agentic' ? renderAgenticMeta(r) : ''}
    `;
  } catch (e) {
    target.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

async function doCompareAsk() {
  const q = document.getElementById('ask-input').value.trim();
  if (!q) return;

  const lang = document.getElementById('ask-lang').value || null;
  const topK = Math.max(1, Math.min(20, parseInt(document.getElementById('ask-topk').value || '5', 10)));
  const target = document.getElementById('ask-compare');
  const askTarget = document.getElementById('ask-results');
  askTarget.innerHTML = '';

  const payload = {
    question: q,
    top_k: topK,
    language_filter: lang,
    document_id: null,
    temperature: 0.3,
    history: []
  };

  target.innerHTML = '<div class="loading-text"><span class="loading"></span> Comparaison en cours…</div>';

  const tClassic = performance.now();
  const classicPromise = api.post('/ask', payload).then(r => ({ok:true, data:r, elapsed:performance.now()-tClassic})).catch(e => ({ok:false, error:e.message, elapsed:performance.now()-tClassic}));

  const tAgentic = performance.now();
  const agenticPromise = api.post('/ask-agentic', payload).then(r => ({ok:true, data:r, elapsed:performance.now()-tAgentic})).catch(e => ({ok:false, error:e.message, elapsed:performance.now()-tAgentic}));

  const [classic, agentic] = await Promise.all([classicPromise, agenticPromise]);

  const classicSummary = classic.ok
    ? `<div class="panel-title">Classique</div>
       <div class="text-muted" style="font-size:12px;margin-bottom:8px">Latence: ${classic.elapsed.toFixed(1)} ms · Chunks: ${classic.data.chunks_used || 0}</div>
       <div style="line-height:1.6;font-size:13px;white-space:pre-wrap;max-height:260px;overflow:auto">${classic.data.answer || ''}</div>`
    : `<div class="panel-title">Classique</div><div class="text-danger">Erreur: ${classic.error}</div>`;

  const agenticSummary = agentic.ok
    ? `<div class="panel-title">Agentic</div>
       <div class="text-muted" style="font-size:12px;margin-bottom:8px">Latence API: ${agentic.elapsed.toFixed(1)} ms · Route: ${agentic.data.route_decision || '—'} · Tentatives: ${agentic.data.retrieval_attempts ?? 0}</div>
       <div class="text-muted" style="font-size:12px;margin-bottom:8px">Timing interne: total ${fmtMs(agentic.data.timings_ms?.total)} ms</div>
       <div style="line-height:1.6;font-size:13px;white-space:pre-wrap;max-height:260px;overflow:auto">${agentic.data.answer || ''}</div>`
    : `<div class="panel-title">Agentic</div><div class="text-danger">Erreur: ${agentic.error}</div>`;

  const delta = (agentic.elapsed - classic.elapsed).toFixed(1);
  const deltaLabel = Number(delta) >= 0 ? `+${delta}` : `${delta}`;

  target.innerHTML = `
    <div class="panel" style="margin-top:12px">
      <div class="panel-title">Comparateur Classique vs Agentic</div>
      <div class="text-muted" style="font-size:12px;margin-bottom:12px">Delta latence (agentic - classique): ${deltaLabel} ms</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="panel" style="margin:0">${classicSummary}</div>
        <div class="panel" style="margin:0">${agenticSummary}</div>
      </div>
    </div>
    ${agentic.ok ? renderAgenticMeta(agentic.data) : ''}
  `;
}

async function doSearch() {
  const q = document.getElementById('q-input').value.trim();
  if (!q) return;
  const lang = document.getElementById('q-lang').value || null;
  const results = document.getElementById('search-results');
  results.innerHTML = '<div class="loading-text"><span class="loading"></span></div>';

      </div>`).join('');
  } catch(e) { results.innerHTML = `<div class="empty">${e.message}</div>`; }
}

async function loadPosture(profileId){
  const pid = profileId || document.getElementById('posture-profile').value;
  if(!pid) return;
  const container = document.getElementById('posture-content');
  container.innerHTML = '<div class="loading-text"><span class="loading"></span></div>';
  try{
    const [posture, gaps, roadmap] = await Promise.all([
      api.get(`/compliance/posture/${pid}`).catch(()=>null),
      api.get(`/compliance/gaps/${pid}`).catch(()=>({gaps:[]})),
      api.get(`/company-profiles/${pid}/roadmap`).catch(()=>null)
    ]);
    if(!posture){ container.innerHTML = '<div class="empty">Impossible de charger la posture</div>'; return; }
    const pct = posture.overall_coverage_score||0;
    const chartId = 'posture-chart-'+pid.replace(/[^a-z0-9]/gi,'');
    const plan = roadmap?.ordered_plan || roadmap?.roadmap || [];
    container.innerHTML = `
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card" style="text-align:center"><div class="stat-value" style="font-size:32px;color:${pct>=0.8?'var(--success)':pct>=0.5?'var(--warn)':'var(--danger)'}">${(pct*100).toFixed(0)}%</div><div class="stat-label">Couverture globale</div></div>
        <div class="stat-card" style="text-align:center"><div class="stat-value" style="font-size:32px">${posture.total_applicable||0}</div><div class="stat-label">Exigences applicables</div></div>
        <div class="stat-card" style="text-align:center"><div class="stat-value" style="font-size:32px">${posture.fully_covered||0}</div><div class="stat-label">Couvertes</div></div>
        <div class="stat-card" style="text-align:center"><div class="stat-value" style="font-size:32px">${posture.not_covered||0}</div><div class="stat-label">Non couvertes</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-top:16px">
        <div class="panel"><div class="panel-title">Répartition</div><canvas id="${chartId}" height="200"></canvas></div>
        <div class="panel"><div class="panel-title">Écarts (${posture.gaps?.length||0})</div>
          ${posture.gaps?.length?posture.gaps.slice(0,10).map(g=>`<div class="audit-item"><div class="audit-dot audit-dot-${g.coverage_status}"></div><div><div class="flex gap-8 items-center"><span class="audit-event">${escapeHtml(g.exigence_title||g.exigence_id||'Exigence')}</span>${tag(g.coverage_status,g.coverage_status)}</div><div class="audit-detail">Score: ${(g.best_coverage_score*100).toFixed(0)}% · Contrôles liés: ${g.linked_controls}${g.has_exception?' · Exception':''}</div></div></div>`).join(''):'<div class="empty">Aucun écart majeur</div>'}
        </div>
      </div>
      <div class="panel" style="margin-top:16px"><div class="panel-title">Feuille de route (${plan.length})</div>
        ${plan.length?plan.slice(0,8).map((step,i)=>`<div class="roadmap-item"><div class="roadmap-header"><span class="roadmap-pos">${step.position||i+1}</span><div style="flex:1"><div class="roadmap-action">${escapeHtml(step.action_precise||step.action_summary||step.action_id)}</div><div class="roadmap-meta">${tag(step.criticality_level||'—',step.criticality_level||'—')} ${step.loi_code?`<span class="badge badge-info" style="font-size:10px">${escapeHtml(step.loi_code)}</span>`:''} ${step.article_key?`<code style="font-size:10px">${escapeHtml(step.article_key)}</code>`:''}</div></div></div></div>`).join(''):'<div class="empty">Aucune roadmap</div>'}
      </div>`;
    setTimeout(()=>{
      const ctx = document.getElementById(chartId);
      if(ctx && typeof Chart !== 'undefined'){
        new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['Couvertes','Partielles','Non couvertes','Exceptions'],
            datasets: [{ data: [posture.fully_covered||0, posture.partially_covered||0, posture.not_covered||0, posture.excepted||0], backgroundColor: ['#34d399','#fbbf24','#f87171','#60a5fa'], borderWidth:0 }]
          },
          options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{color:'#9896a8',font:{size:11}}}}, cutout:'65%' }
        });
      }
    }, 50);
  }catch(e){ container.innerHTML = `<div class="empty">${e.message}</div>`; }
}

let actionsSubTab = 'connexions';

async function renderActions(c) {
  const isSuperAdmin = currentRole() === 'super_admin';
  const tabs = [
    {key:'connexions', icon:'🔑', label:'Connexions'},
    {key:'activites', icon:'📋', label:'Activités récentes'},
    ...(isSuperAdmin ? [{key:'notifications', icon:'🔔', label:'Notifications'}] : []),
    {key:'invitations', icon:'✉️', label:'Invitations'},
    {key:'comptes', icon:'👤', label:'Gestion comptes'},
  ];

  c.innerHTML = `
    <div class="section-header"><span class="section-title">🔔 Actions — Activité des comptes</span></div>
    <div class="steps" id="actions-tabs">
      ${tabs.map(t => `<div class="step ${t.key===actionsSubTab?'active':''}" onclick="switchActionsTab('${t.key}')">
        <span class="step-num">${t.icon}</span><span class="step-lbl">${t.label}</span>
      </div>`).join('')}
    </div>
    <div id="actions-content"><div class="loading-text"><span class="loading"></span> Chargement…</div></div>`;

  await renderActionsSubTab(actionsSubTab);
}

function switchActionsTab(tab) {
  actionsSubTab = tab;
  document.querySelectorAll('#actions-tabs .step').forEach(s => s.classList.toggle('active', s.textContent.includes(
    {connexions:'Connexions',activites:'Activités',notifications:'Notifications',invitations:'Invitations',comptes:'Gestion'}[tab]
  )));
  renderActionsSubTab(tab);
}

async function renderActionsSubTab(tab) {
  const el = document.getElementById('actions-content');
  if (!el) return;
  el.innerHTML = `<div class="loading-text"><span class="loading"></span> Chargement…</div>`;
  try {
    const renderers = {
      connexions: renderActionsConnexions,
      activites: renderActionsActivites,
      notifications: renderActionsNotifications,
      invitations: renderActionsInvitations,
      comptes: renderActionsComptes,
    };
    if (renderers[tab]) await renderers[tab](el);
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>${escapeHtml(e.message)}</p></div>`;
  }
}

// ── Sous-onglet : Connexions ──────────────────────────────────────────
async function renderActionsConnexions(el) {
  const currentUser = typeof AuthGuard !== 'undefined' ? AuthGuard.getUser() : null;
  if (!currentUser?.organization_id) { el.innerHTML = '<div class="empty">Aucune organisation</div>'; return; }

  const data = await authApi.get(`/auth/organizations/${currentUser.organization_id}/users?limit=100`);
  const users = (data.users || []).slice().sort((a, b) => {
    if (!a.last_login) return 1;
    if (!b.last_login) return -1;
    return new Date(b.last_login) - new Date(a.last_login);
  });

  const now = Date.now();
  function loginStatus(d) {
    if (!d) return '<span class="tag tag-closed">Jamais connecté</span>';
    const diff = now - new Date(d).getTime();
    if (diff < 3600000) return '<span class="tag tag-active">En ligne</span>';
    if (diff < 86400000) return '<span class="tag tag-open">Aujourd\'hui</span>';
    if (diff < 604800000) return '<span class="tag tag-pending">Cette semaine</span>';
    return '<span class="tag tag-closed">Inactif</span>';
  }

  el.innerHTML = `
    <div class="panel">
      <div class="panel-title">🔑 Journal des connexions</div>
      <div class="stats-grid" style="margin-bottom:16px">
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${users.length}</div><div class="stat-label">Utilisateurs total</div></div>
        <div class="stat-card"><div class="stat-icon">🟢</div><div class="stat-value">${users.filter(u => u.last_login && (now - new Date(u.last_login).getTime()) < 86400000).length}</div><div class="stat-label">Actifs aujourd'hui</div></div>
        <div class="stat-card"><div class="stat-icon">🔴</div><div class="stat-value">${users.filter(u => !u.last_login).length}</div><div class="stat-label">Jamais connectés</div></div>
        <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-value">${users.filter(u => u.last_login && (now - new Date(u.last_login).getTime()) > 604800000).length}</div><div class="stat-label">Inactifs (+7j)</div></div>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Utilisateur</th><th>Email</th><th>Rôle</th><th>Dernière connexion</th><th>Statut</th></tr></thead>
        <tbody>
          ${users.map(u => `<tr>
            <td><strong>${escapeHtml(u.full_name || '—')}</strong></td>
            <td style="font-size:12px;color:var(--text2)">${escapeHtml(u.email || '—')}</td>
            <td>${tag(u.role, u.role)}</td>
            <td style="font-size:12px">${fmtDate(u.last_login)}</td>
            <td>${loginStatus(u.last_login)}</td>
          </tr>`).join('') || '<tr><td colspan="5">Aucun utilisateur</td></tr>'}
        </tbody>
      </table></div>
    </div>`;
}

// ── Sous-onglet : Activités récentes ──────────────────────────────────
let activitesPage = 0;
async function renderActionsActivites(el, skip=0) {
  activitesPage = skip;
  const limit = 20;
  const data = await api.get(`/audit-logs?skip=${skip}&limit=${limit}`).catch(() => ({logs:[], total:0}));
  const logs = data.logs || [];
  const total = data.total || 0;

  function eventIcon(type) {
    const icons = {amendment_applied:'📝', version_superseded:'🔄', article_created:'➕', article_updated:'✏️', loi_created:'⚖️', document_uploaded:'📄', user_login:'🔑'};
    return icons[type] || '📌';
  }

  el.innerHTML = `
    <div class="panel">
      <div class="panel-title">📋 Activités récentes — Journal d'audit (${total})</div>
      ${logs.length ? `<div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Événement</th><th>Détails</th><th>Référence</th></tr></thead>
        <tbody>
          ${logs.map(l => `<tr>
            <td style="font-size:12px;white-space:nowrap">${fmtDate(l.created_at || l.timestamp)}</td>
            <td>${eventIcon(l.event_type)} ${tag(l.event_type, l.event_type)}</td>
            <td style="max-width:300px;font-size:12px;color:var(--text2)">${escapeHtml((l.summary || l.details || '').slice(0, 120))}</td>
            <td style="font-size:11px;color:var(--text3)">${escapeHtml(l.loi_id || l.article_id || '—')}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>` : '<div class="empty"><div class="empty-icon">📋</div><p>Aucune activité enregistrée</p></div>'}
      ${total > limit ? `<div class="pagination">
        <button class="btn btn-secondary btn-sm" ${skip===0?'disabled':''} onclick="renderActionsActivites(document.getElementById('actions-content'), ${Math.max(0,skip-limit)})">← Précédent</button>
        <span class="page-info">${skip+1}–${Math.min(skip+limit, total)} / ${total}</span>
        <button class="btn btn-secondary btn-sm" ${skip+limit>=total?'disabled':''} onclick="renderActionsActivites(document.getElementById('actions-content'), ${skip+limit})">Suivant →</button>
      </div>` : ''}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════
// UTILISATEURS
// ══════════════════════════════════════════════════════════════════════
const ROLE_LABELS = {
  super_admin: 'Super Admin',
  owner: 'Owner',
  admin: 'Admin',
  member: 'Member',
  viewer: 'Viewer',
};

function roleLabel(role) {
  return trMaybe(`role.${enumKey(role)}`) || ROLE_LABELS[role] || role || '—';
}

function editableRoleOptions(selected) {
  return ['admin', 'member', 'viewer']
    .map(role => `<option value="${role}" ${role===selected?'selected':''}>${roleLabel(role)}</option>`)
    .join('');
}

function userRoleControl(user) {
  if (!['admin', 'member', 'viewer'].includes(user.role)) {
    return tag(user.role, user.role);
  }
  return `<select onchange="updateOrgUserRole('${user.id}', this.value)">${editableRoleOptions(user.role)}</select>`;
}

function userStatusControl(user) {
  const locked = user.role === 'owner';
  return `<label class="flex gap-8 items-center" style="font-size:12px;color:var(--text2)">
    <input type="checkbox" ${user.is_active?'checked':''} ${locked?'disabled':''} onchange="updateOrgUserStatus('${user.id}', this.checked)">
    ${tr('status.active')}
  </label>`;
}

async function updateOrgUserRole(userId, role) {
  try {
    await authApi.put('/auth/users/' + userId, {role});
    toast(tr('admin.users.roleUpdated'), 'success');
    navigate('users');
  } catch(e) { toast(e.message, 'error'); navigate('users'); }
}

async function updateOrgUserStatus(userId, isActive) {
  try {
    await authApi.put('/auth/users/' + userId, {is_active: isActive});
    toast(tr('admin.users.statusUpdated'), 'success');
    navigate('users');
  } catch(e) { toast(e.message, 'error'); navigate('users'); }
}

async function deactivateOrgUser(userId) {
  if (!confirm(tr('admin.users.confirmDeactivate'))) return;
  try {
    await authApi.del('/auth/users/' + userId);
    toast(tr('admin.users.userDisabled'), 'success');
    navigate('users');
  } catch(e) { toast(e.message, 'error'); }
}

async function revokeInvitation(invitationId) {
  if (!confirm(tr('admin.users.confirmRevoke'))) return;
  try {
    await authApi.del('/auth/invitations/' + invitationId);
    toast(tr('admin.users.invitationRevoked'), 'success');
    navigate('users');
  } catch(e) { toast(e.message, 'error'); }
}

// ══════════════════════════════════════════════════════════════════════
// ENTREPRISES
// ══════════════════════════════════════════════════════════════════════
async function renderOrganizations(c) {
  const data = await authApi.get('/auth/organizations?limit=100');
  const organizations = data.organizations || [];
  c.innerHTML = `
    <div class="section-header"><span class="section-title">${tr('admin.organizations.title')}</span><span class="text-muted" style="font-size:12px">${data.total || organizations.length}</span></div>
    <div class="table-wrap"><table>
      <thead><tr><th>${tr('common.name')}</th><th>${tr('common.sector')}</th><th>${tr('common.size')}</th><th>${tr('common.employees')}</th><th>${tr('common.subscription')}</th><th>${tr('common.subscriptionEnd')}</th><th>${tr('common.members')}</th><th>${tr('common.status')}</th><th>${tr('common.createdAt')}</th></tr></thead>
      <tbody>
        ${organizations.map(org => `<tr>
          <td><strong>${escapeHtml(org.name || '—')}</strong></td>
          <td>${escapeHtml(fmtEnum(org.sector))}</td>
          <td>${escapeHtml(fmtEnum(org.size))}</td>
          <td>${fmt(org.employees)}</td>
          <td>${escapeHtml(fmtEnum(org.subscription_type))}</td>
          <td style="font-size:12px;color:var(--text2)">${fmtDate(org.subscription_ends_at)}</td>
          <td>${fmt(org.member_count)}</td>
          <td>${tag(org.status, org.status)}</td>
          <td style="font-size:12px;color:var(--text2)">${fmtDate(org.created_at)}</td>
        </tr>`).join('') || `<tr><td colspan="9">${tr('common.noOrganizations')}</td></tr>`}
      </tbody>
    </table></div>`;
}

// ── Modal close ────────────────────────────────────────────────────────
function closeModal() {
  document.querySelectorAll('.modal-bg').forEach(m => m.remove());
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ── Init ───────────────────────────────────────────────────────────────
(async () => {
  DaleelI18n.init({
    switcher: '.topbar-right',
    onChange: async () => {
      renderSidebar();
      updateAdminChrome();
      await render(currentSection);
    }
  });
  updateAdminChrome();
  renderSidebar();
  try {
    await api.get('/admin/stats');
    document.getElementById('api-status').textContent = `🟢 ${tr('common.connected')}`;
    document.getElementById('api-status').className = 'badge badge-success';
  } catch(e) {
    document.getElementById('api-status').textContent = `🔴 ${tr('common.offline')}`;
    document.getElementById('api-status').className = 'badge badge-warn';
  }
  await loadHeaderNotifications();
  await render(defaultSection());
})();

// ══════════════════════════════════════════════════════════════════════
// ADMINISTRATION (regroupe les sections techniques)
// ══════════════════════════════════════════════════════════════════════
let adminSubSection = 'lois';

async function renderAdministration(c) {
  const tabs = [
    {key:'lois', labelKey:'admin.adminTabs.laws', icon:'⚖️'},
    {key:'cases', labelKey:'admin.adminTabs.cases', icon:'📂'},
    {key:'posture', labelKey:'admin.adminTabs.posture', icon:'🛡️'},
    {key:'assessments', labelKey:'admin.adminTabs.assessments', icon:'📊'},
    {key:'controls', labelKey:'admin.adminTabs.controls', icon:'🔒'},
    {key:'exceptions', labelKey:'admin.adminTabs.exceptions', icon:'⚠️'},
    {key:'audit', labelKey:'admin.adminTabs.audit', icon:'📋'},
    {key:'recherche', labelKey:'admin.adminTabs.search', icon:'🔍'},
    {key:'vecteur', labelKey:'admin.adminTabs.vectors', icon:'⚡'},
  ];

  c.innerHTML = `
    <div class="section-header"><span class="section-title">${tr('admin.administration.title')}</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px" id="admin-tabs">
      ${tabs.map(t => `<button class="btn ${t.key===adminSubSection?'btn-primary':'btn-secondary'} btn-sm" onclick="adminSubSection='${t.key}';navigate('administration')">${t.icon} ${tr(t.labelKey)}</button>`).join('')}
    </div>
    <div id="admin-sub-content"><div class="loading-text"><span class="loading"></span> ${tr('common.loading')}</div></div>`;

  const subC = document.getElementById('admin-sub-content');
  const subRenders = {
    lois: renderLois, cases: renderCases, posture: renderPosture,
    assessments: renderAssessments, controls: renderControls,
    exceptions: renderExceptions, audit: renderAudit,
    recherche: renderRecherche, vecteur: renderVecteur
  };
  if (subRenders[adminSubSection]) await subRenders[adminSubSection](subC);
}
</script>
