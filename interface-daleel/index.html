    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --bg-card: #16162a;
            --bg-user-msg: #2d1b69;
            --bg-bot-msg: #1a1a2e;
            --bg-source: #1e1e3a;
            --accent: #7c5cfc;
            --accent-light: #a78bfa;
            --accent-glow: rgba(124, 92, 252, 0.15);
            --text-primary: #e8e6f0;
            --text-secondary: #9896a8;
            --text-muted: #6b6980;
            --border: #2a2a40;
            --border-accent: rgba(124, 92, 252, 0.3);
            --success: #34d399;
            --warning: #fbbf24;
            --gradient-1: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 50%, #c084fc 100%);
            --gradient-2: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(124, 92, 252, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        /* â”€â”€ Sidebar â”€â”€ */
        .app-sidebar {
            width: 300px;
            background: #111019;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-logo {
            height: 98px;
            padding: 12px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .sidebar-brand-logo {
            width: 100%;
            max-width: 190px;
            height: 72px;
            object-fit: contain;
            object-position: left center;
            display: block;
            transform: scale(1.25);
            transform-origin: left center;
        }

        .sidebar-nav {
            padding: 24px 0 16px;
            flex: 1;
            overflow-y: auto;
        }

        .nav-group {
            margin-bottom: 18px;
        }

        .nav-group-title {
            padding: 0 23px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #7e769b;
        }

        .nav-item {
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 23px;
            cursor: pointer;
            transition: 0.15s;
            color: #b7b3c7;
            border: 0;
            border-left: 4px solid transparent;
            background: transparent;
            font-size: 14px;
            font-family: inherit;
            text-decoration: none;
            text-align: left;
        }

        .nav-item:hover {
            background: rgba(124, 92, 252, 0.12);
            color: #fff;
        }

        .nav-item.active {
            background: #2a2246;
            color: var(--accent-light);
            border-left-color: var(--accent);
        }

        .nav-item .icon {
            width: 22px;
            text-align: center;
            font-size: 17px;
            line-height: 1;
            flex-shrink: 0;
        }

        .history-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: .15s;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }
        .history-item:hover {
            background: rgba(124,92,252,.08);
            border-color: var(--border);
        }
        .history-item.active {
            background: rgba(124,92,252,.12);
            border-color: var(--accent);
        }
        .history-item-question {
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .history-item-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
        }
        .history-empty {
            padding: 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        .sidebar-footer {
            padding: 16px 22px 14px;
            background: #181829;
            border-top: 1px solid var(--border);
        }

        .footer-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .footer-avatar {
            width: 43px;
            height: 43px;
            border-radius: 12px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            box-shadow: 0 8px 22px rgba(124, 92, 252, 0.28);
            flex-shrink: 0;
        }

        .footer-name {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .footer-role {
            font-size: 13px;
            color: var(--accent-light);
            line-height: 1.35;
        }

        .footer-org {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .footer-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .footer-btn {
            height: 34px;
            border-radius: 9px;
            border: 1px solid rgba(248, 113, 113, 0.35);
            background: rgba(248, 113, 113, 0.12);
            color: #ff7f8d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
        }

        .footer-btn:hover {
            background: rgba(248, 113, 113, 0.18);
            border-color: rgba(248, 113, 113, 0.55);
            color: #ff9aa5;
        }

        .chat-main {
            flex: 1;
            min-width: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* â”€â”€ Header â”€â”€ */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            backdrop-filter: blur(20px);
        }

        .header-logo {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: var(--shadow-glow);
        }

        .header-logo img {
            width: 33px;
            height: 32px;
            object-fit: contain;
            display: block;
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 600;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-info p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .header-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .header-actions {
            display: none;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .new-chat-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-left: 12px;
        }

        .header-actions .new-chat-btn {
            margin-left: 0;
        }

        .new-chat-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
        }

        /* â”€â”€ Chat Area â”€â”€ */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .chat-container::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* â”€â”€ Welcome Screen â”€â”€ */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 40px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 0 60px rgba(124, 92, 252, 0.3);
            overflow: hidden;
        }

        .welcome-icon img {
            width: 60px;
            height: 58px;
            object-fit: contain;
            display: block;
        }

        .welcome h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 700px;
        }

        .suggestion-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .suggestion-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
            transform: translateY(-2px);
        }

        /* â”€â”€ Messages â”€â”€ */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .message.user .msg-avatar {
            background: var(--bg-user-msg);
            color: var(--accent-light);
        }

        .message.bot .msg-avatar {
            background: var(--gradient-1);
            color: white;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg-bubble {
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.7;
            font-size: 14px;
        }

        .message.user .msg-bubble {
            background: var(--bg-user-msg);
            border: 1px solid rgba(124, 92, 252, 0.2);
            border-bottom-right-radius: 4px;
        }

        .message.bot .msg-bubble {
            background: var(--bg-bot-msg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* RTL support for Arabic messages */
        .msg-bubble[dir="rtl"] {
            text-align: right;
            direction: rtl;
        }

        .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
            margin: 16px 0 8px;
            color: var(--accent-light);
        }

        .msg-bubble h2 { font-size: 16px; }
        .msg-bubble h3 { font-size: 15px; }

        .msg-bubble p { margin: 6px 0; }

        .msg-bubble strong {
            color: var(--accent-light);
            font-weight: 600;
        }

        .msg-bubble ul, .msg-bubble ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .msg-bubble[dir="rtl"] ul, .msg-bubble[dir="rtl"] ol {
            padding-left: 0;
            padding-right: 20px;
        }

        .msg-bubble li { margin: 4px 0; }

        .msg-bubble code {
            background: rgba(124, 92, 252, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .message.user .msg-time { text-align: right; }

        /* â”€â”€ Feedback Panel â”€â”€ */
        .feedback-panel {
            margin-top: 10px;
            background: var(--bg-source);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .feedback-title {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .feedback-textarea {
            width: 100%;
            min-height: 90px;
            max-height: 220px;
            resize: vertical;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 10px 12px;
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            outline: none;
        }

        .feedback-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .feedback-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .feedback-save-btn {
            background: var(--gradient-1);
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
        }

        .feedback-save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .feedback-skip-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
        }

        .feedback-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* â”€â”€ Sources Panel â”€â”€ */
        .sources-panel {
            margin-top: 4px;
        }

        .sources-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-source);
            border: 1px solid var(--border);
            color: var(--accent-light);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .sources-toggle:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .sources-toggle .arrow {
            transition: transform 0.3s ease;
            font-size: 10px;
        }

        .sources-toggle.open .arrow {
            transform: rotate(180deg);
        }

        .sources-list {
            display: none;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sources-list.hidden { display: none; }

        .source-card {
            background: var(--bg-source);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .source-card:hover {
            border-color: var(--border-accent);
            transform: translateX(4px);
        }

        .source-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-glow);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .source-info {
            flex: 1;
            min-width: 0;
        }

        .source-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .source-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .source-score {
            background: var(--accent-glow);
            color: var(--accent-light);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* â”€â”€ Loading â”€â”€ */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 20px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* â”€â”€ Input Area â”€â”€ */
        .input-area {
            padding: 16px 24px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            position: relative;
        }

        .input-box textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            resize: none;
            min-height: 48px;
            max-height: 150px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-box textarea::placeholder {
            color: var(--text-muted);
        }

        .input-box textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-area.voice-active .input-box,
        .input-area.voice-active > .input-wrapper > .voice-btn,
        .input-area.voice-active > .input-wrapper > .send-btn {
            display: none;
        }

        .input-area.voice-active .input-wrapper {
            align-items: center;
        }

        .input-area.voice-active .input-hint {
            visibility: hidden;
        }

        .voice-btn {
            width: 48px;
            height: 48px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .voice-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
        }

        .voice-btn.recording {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
            animation: voicePulse 1.5s infinite;
        }

        @keyframes voicePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        .voice-btn.processing {
            opacity: 0.6;
            cursor: wait;
        }

        .voice-message-area {
            display: flex;
            align-items: center;
            flex: 1;
            gap: 8px;
            min-width: 0;
            min-height: 48px;
        }

        .voice-message-area[hidden] {
            display: none;
        }

        .voice-icon-btn {
            width: 34px;
            height: 34px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: #2f80ed;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .voice-icon-btn:hover {
            background: rgba(47, 128, 237, 0.14);
            color: #60a5fa;
        }

        .voice-send-btn:hover {
            transform: translateX(1px);
        }

        .voice-preview-pill {

    <script>
        function getApiCandidates() {
            const bases = [];

            // Preferred path when UI is served by FastAPI at the same origin.
            if (window.location.protocol !== 'file:') {
                bases.push(`${window.location.origin}/api/v1`);
            }

            // Fallbacks for local development when opening the HTML directly.
            bases.push('http://127.0.0.1:8000/api/v1');
            bases.push('http://localhost:8000/api/v1');
            bases.push('http://127.0.0.1:8001/api/v1');
            bases.push('http://localhost:8001/api/v1');

            // Deduplicate while preserving order.
            return [...new Set(bases)];
        }

        const API_CANDIDATES = getApiCandidates();
        let activeApiBase = API_CANDIDATES[0] || '/api/v1';

        async function fetchWithApiFallback(path, options) {
            let lastError = null;

            for (const base of API_CANDIDATES) {
                try {
                    const request = (typeof AuthGuard !== 'undefined' && AuthGuard.getAccessToken())
                        ? AuthGuard.authFetch
                        : fetch;
                    const response = await request(`${base}${path}`, options);

                    // If backend responds (even with 4xx/5xx), consider endpoint reachable.
                    activeApiBase = base;
                    return response;
                } catch (err) {
                    lastError = err;
                }
            }

            throw lastError || new Error('API endpoint unreachable');
        }
        async function readResponsePayload(response) {
            const raw = await response.text();

            if (!raw) {
                return null;
            }

            try {
                return JSON.parse(raw);
            } catch (_) {
                return { detail: raw };
            }
        }

        // â”€â”€ Conversation history â”€â”€
        let conversationHistory = [];

        // â”€â”€ Arabic detection â”€â”€
        function isArabic(text) {
            const arabicRe = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/;
            const arabicChars = (text.match(/[\u0600-\u06FF]/g) || []).length;
            return arabicChars >= 2;
        }

        function detectMessageLanguage(text) {
            if (isArabic(text)) return 'ar';
            const lower = (text || '').toLowerCase();
            const frenchMarkers = [
                'quelle', 'quelles', 'quel', 'quels', 'comment', 'pourquoi',
                'dans', 'pour', 'avec', 'selon', 'droit', 'loi', 'article',
                'sociÃ©tÃ©', 'societe', 'contrat', 'obligation', 'obligations'
            ];
            if (/[Ã Ã¢Ã¤Ã©Ã¨ÃªÃ«Ã¯Ã®Ã´Ã¹Ã»Ã¼Ã¿Ã§Å“Ã¦]/i.test(text)) return 'fr';
            if (frenchMarkers.filter((word) => lower.includes(word)).length >= 2) return 'fr';
            return 'en';
        }

        // â”€â”€ Auto-resize textarea â”€â”€
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
            // Auto-detect RTL
            if (isArabic(el.value)) {

            } else {

        }

        function askSuggestion(btn) {

        // â”€â”€ Adaptive retrieval settings â”€â”€
        function getAdaptiveRetrievalSettings(text) {
            const trimmed = (text || '').trim();
            const words = trimmed.split(/\s+/).filter(Boolean).length;
            const hasQuestionChain = /[ØŸ?].*[ØŸ?]|\b(et|ou|puis|ensuite|ainsi que|Ùˆ|Ø«Ù…|Ø£Ùˆ)\b/i.test(trimmed);
            const hasArticleMention = /(article|Ø§Ù„ÙØµÙ„|ÙØµÙ„)\s*\d+/i.test(trimmed);

            // Default: balanced retrieval.
            let topK = 12;
            let temperature = 0.2;

            // Complex or multi-part legal questions need deeper retrieval.
            if (words >= 18 || hasQuestionChain || hasArticleMention) {
                topK = 20;
                temperature = 0.15;
            }

            // Very short questions can stay lighter.
            if (words <= 6 && !hasArticleMention) {
                topK = 10;
                temperature = 0.2;
            }

            return { topK, temperature };
        }

        // â”€â”€ New chat â”€â”€
        function newChat() {
            conversationHistory = [];

            renderWelcome();

        // â”€â”€ Sidebar history â”€â”€
        let sidebarHistoryLoaded = false;

        async function loadSidebarHistory() {
            const container = document.getElementById('sidebar-history');
            if (!container) return;
            try {
                const API = '/api/v1';
                const request = typeof AuthGuard !== 'undefined' ? AuthGuard.authFetch : fetch;
                const r = await request(API + '/chat-history?limit=30');
                if (!r.ok) throw new Error('');
                const data = await r.json();
                const entries = data.entries || [];

                if (!entries.length) {
                    container.innerHTML = '<div class="history-empty">Aucune conversation</div>';
                    return;
                }

                // Group by date
                const today = new Date().toDateString();
                const yesterday = new Date(Date.now() - 86400000).toDateString();
                let html = '';
                let lastGroup = '';

                entries.forEach((entry, i) => {
                    const d = new Date(entry.created_at);
                    const dateStr = d.toDateString();
                    let group = '';
                    if (dateStr === today) group = "Aujourd'hui";
                    else if (dateStr === yesterday) group = 'Hier';
                    else group = d.toLocaleDateString('fr-FR', {day:'2-digit', month:'short'});

                    if (group !== lastGroup) {
                        html += `<div style="font-size:10px;color:#7e769b;text-transform:uppercase;letter-spacing:.1em;padding:8px 6px 4px">${group}</div>`;
                        lastGroup = group;
                    }

        // â”€â”€ Simple markdown to HTML â”€â”€
        function renderMarkdown(text) {
            let html = text
                // Headers
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h2>$1</h2>')
                // Bold
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                // Inline code
                .replace(/`(.+?)`/g, '<code>$1</code>')
                // Unordered lists
                .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
                // Numbered lists
                .replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>')
                // Paragraphs
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            // Wrap consecutive <li> in <ul>
            html = html.replace(/(<li>.*?<\/li>)/gs, (match) => {
                if (!match.startsWith('<ul>')) {
                    return '<ul>' + match + '</ul>';
                }
                return match;
            });
            // Clean up nested <ul><ul>
            html = html.replace(/<\/ul>\s*<ul>/g, '');

            return '<p>' + html + '</p>';
        }

        const inputArea = document.querySelector('.input-area');

        let voiceRecordingSession = 0;

        let voiceRecordingTimer = null;

        async function toggleVoice() {
            if (isSendingVoice) return;

            if (isRecording) {

            }
        }

        async function startRecording() {
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                discardVoiceMessage();
                const sessionId = ++voiceRecordingSession;
                sendVoiceAfterRecording = false;
                const recorderOptions = MediaRecorder.isTypeSupported('audio/webm')
                    ? { mimeType: 'audio/webm' }
                    : {};
                mediaRecorder = new MediaRecorder(stream, recorderOptions);
                const recorder = mediaRecorder;
                const recordingChunks = [];

                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordingChunks.push(e.data);
                };

                const startedAt = Date.now();
                recorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    const mimeType = recorder.mimeType || 'audio/webm';
                    const audioBlob = new Blob(recordingChunks, { type: mimeType });
                    if (mediaRecorder === recorder) mediaRecorder = null;

                    if (sessionId !== voiceRecordingSession) return;

                    clearVoiceRecordingTimer();
                    voiceMessageArea.classList.remove('is-recording');

                    if (!audioBlob.size) {
                        hideVoiceMessageArea();
                        sendVoiceAfterRecording = false;
                        alert('Aucun audio dÃ©tectÃ©. RÃ©essayez.');
                        return;
                    }

                    pendingVoiceBlob = audioBlob;
                    showVoiceMessageReady(Math.max(1, Math.round((Date.now() - startedAt) / 1000)));

                    if (sendVoiceAfterRecording) {
                        sendVoiceAfterRecording = false;
                        await sendVoiceMessage();
                    }
                };

                recorder.start();
                isRecording = true;
                voiceRecordingStartedAt = startedAt;
                showVoiceRecording(startedAt);
                voiceBtn.classList.add('recording');
                voiceBtn.innerHTML = 'â¹ï¸';
                voiceBtn.title = 'ArrÃªter l\'enregistrement';
            } catch (err) {
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    hideVoiceMessageArea();
                }
                alert('Microphone non accessible. VÃ©rifiez les permissions.');
                console.error('Mic error:', err);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            resetVoiceButton();
        }

        function showVoiceRecording(startedAt) {
            cleanupVoicePreview();
            pendingVoiceBlob = null;
            voiceMessageDuration.textContent = '0:00';
            setVoiceInputMode(true);
            voiceMessageArea.hidden = false;
            voiceMessageArea.classList.add('is-recording');
            if (voicePreviewPlayBtn) {
                voicePreviewPlayBtn.title = 'ArrÃªter l\'enregistrement';
                voicePreviewPlayBtn.setAttribute('aria-label', 'ArrÃªter l\'enregistrement');
            }
            startVoiceRecordingTimer(startedAt);
        }

        function showVoiceMessageReady(durationSeconds) {
            voiceMessageArea.classList.remove('is-recording');
            voiceMessageDuration.textContent = formatVoiceDuration(durationSeconds);
            prepareVoicePreviewAudio();
            setVoiceInputMode(true);
            voiceMessageArea.hidden = false;
        }

        function discardVoiceMessage() {
            sendVoiceAfterRecording = false;

            if (isRecording) {
                const recorder = mediaRecorder;
                voiceRecordingSession += 1;
                isRecording = false;
                clearVoiceRecordingTimer();
                resetVoiceButton();

                if (recorder && recorder.state !== 'inactive') {
                    recorder.stop();
                }
            }

            cleanupVoicePreview();
            pendingVoiceBlob = null;
            hideVoiceMessageArea();
        }

        async function sendVoiceMessage() {
            if (isRecording) {
                sendVoiceAfterRecording = true;
                stopRecording();
                return;
            }

            if (!pendingVoiceBlob || isSendingVoice) return;

            const audioBlob = pendingVoiceBlob;
            discardVoiceMessage();
            isSendingVoice = true;
            voiceBtn.classList.add('processing');
            voiceBtn.innerHTML = 'â³';
            voiceBtn.title = 'Traitement en cours...';

            try {
                await processVoiceInput(audioBlob);
            } finally {
                isSendingVoice = false;
            }
        }

        function prepareVoicePreviewAudio() {
            cleanupVoicePreview();

            if (!pendingVoiceBlob) return;

            pendingVoiceUrl = URL.createObjectURL(pendingVoiceBlob);
            const audio = new Audio(pendingVoiceUrl);
            voicePreviewAudio = audio;
            audio.onplay = () => setVoicePreviewPlaying(true);
            audio.onpause = () => setVoicePreviewPlaying(false);
            audio.onended = () => {
                setVoicePreviewPlaying(false);
                audio.currentTime = 0;
            };
        }

        function toggleVoicePreview() {
            if (isRecording) {
                stopRecording();
                return;
            }

            if (!voicePreviewAudio) return;

            if (voicePreviewAudio.paused) {
                voicePreviewAudio.play().catch(e => console.warn('Voice preview playback blocked:', e));
            } else {
                voicePreviewAudio.pause();
            }
        }

        function cleanupVoicePreview() {
            if (voicePreviewAudio) {
                voicePreviewAudio.pause();
                voicePreviewAudio.src = '';
                voicePreviewAudio = null;
            }

            if (pendingVoiceUrl) {
                URL.revokeObjectURL(pendingVoiceUrl);
                pendingVoiceUrl = null;
            }

            setVoicePreviewPlaying(false);
        }

        function hideVoiceMessageArea() {
            if (!voiceMessageArea) return;
            voiceMessageArea.hidden = true;
            voiceMessageArea.classList.remove('is-recording', 'is-playing');
            voiceMessageDuration.textContent = '0:00';

        function startVoiceRecordingTimer(startedAt) {
            clearVoiceRecordingTimer();
            updateVoiceRecordingDuration(startedAt);
            voiceRecordingTimer = setInterval(() => updateVoiceRecordingDuration(startedAt), 250);
        }

        function updateVoiceRecordingDuration(startedAt = voiceRecordingStartedAt) {
            const elapsedSeconds = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
            voiceMessageDuration.textContent = formatVoiceDuration(elapsedSeconds);
        }

        function clearVoiceRecordingTimer() {
            if (voiceRecordingTimer) {
                clearInterval(voiceRecordingTimer);
                voiceRecordingTimer = null;
            }
        }

        function setVoicePreviewPlaying(isPlaying) {
            if (voiceMessageArea) voiceMessageArea.classList.toggle('is-playing', isPlaying);
            if (voicePreviewPlayBtn) {
                voicePreviewPlayBtn.title = isPlaying ? 'Pause' : 'Ecouter le vocal';
                voicePreviewPlayBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Ecouter le vocal');
            }

        function resetVoiceButton() {
            voiceBtn.classList.remove('recording', 'processing');
            voiceBtn.innerHTML = 'ðŸŽ™ï¸';
            voiceBtn.title = 'Assistant vocal';
        }

        function formatVoiceDuration(totalSeconds) {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        async function processVoiceInput(audioBlob) {
            try {
                if (welcomeScreen) welcomeScreen.style.display = 'none';
                addUserMessage('ðŸŽ™ï¸ Message vocal...');

                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.webm');

                const response = await fetchWithApiFallback('/voice/ask', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    const err = await readResponsePayload(response);
                    throw new Error(err?.detail || 'Erreur du serveur');
                }

                const data = await response.json();

                // Update the user message with actual transcription
                const userMessages = chatContainer.querySelectorAll('.message.user');
                const lastUserMsg = userMessages[userMessages.length - 1];
                if (lastUserMsg) {
                    const bubble = lastUserMsg.querySelector('.msg-bubble');
                    if (bubble) bubble.textContent = 'ðŸŽ™ï¸ ' + data.transcription;
                }

                // Show bot response
                addBotMessage(data.answer, data.sources || [], '');

                // Play audio response
                if (data.audio_base64) {
                    playAudioResponse(data.audio_base64, data.audio_content_type);
                }
            } catch (err) {
                addBotMessage('âŒ Erreur vocale: ' + err.message, [], '');
            } finally {
                resetVoiceButton();
            }
        }

        function playAudioResponse(base64Audio, contentType) {
            const audioBytes = atob(base64Audio);
            const byteArray = new Uint8Array(audioBytes.length);
            for (let i = 0; i < audioBytes.length; i++) {
                byteArray[i] = audioBytes.charCodeAt(i);
            }
            const blob = new Blob([byteArray], { type: contentType });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.play().catch(e => console.warn('Audio playback blocked:', e));
            audio.onended = () => URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
